<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZIYOKOR NONLARI — Non Do'koni</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}

:root{
  --glass:rgba(255,255,255,0.05);
  --glass-border:rgba(255,255,255,0.08);
  --glass-hover:rgba(255,255,255,0.1);
  --glass-strong:rgba(255,255,255,0.12);
  --text:#f0ece6;
  --text-dim:rgba(240,236,230,0.5);
  --text-bright:#fff;
  --gold:#d4a574;
  --gold-dim:rgba(212,165,116,0.3);
  --accent:#e86a3a;
  --bg:#0a0806;
  --card-bg:rgba(255,255,255,0.04);
  --radius:16px;
  --transition:all 0.4s cubic-bezier(0.16,1,0.3,1);
}

body{
  font-family:'Inter',-apple-system,sans-serif;
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden;
  line-height:1.5;
  min-height:100vh;
}

/* ORB BACKGROUND */
.orb{
  position:fixed;border-radius:50%;pointer-events:none;z-index:0;filter:blur(120px);
}
.orb-1{width:700px;height:700px;background:rgba(212,165,116,0.04);top:-200px;right:-200px;animation:orb1 25s ease-in-out infinite}
.orb-2{width:500px;height:500px;background:rgba(232,106,58,0.03);bottom:-150px;left:-150px;animation:orb2 30s ease-in-out infinite}
.orb-3{width:400px;height:400px;background:rgba(255,255,255,0.02);top:50%;left:50%;animation:orb3 20s ease-in-out infinite}
@keyframes orb1{0%,100%{transform:translate(0,0)}40%{transform:translate(-80px,100px)}70%{transform:translate(60px,-40px)}}
@keyframes orb2{0%,100%{transform:translate(0,0)}35%{transform:translate(100px,-80px)}65%{transform:translate(-40px,60px)}}
@keyframes orb3{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-50%) scale(1.3)}}

/* NAV */
nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  padding:14px 32px;
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(10,8,6,0.4);
  backdrop-filter:blur(24px) saturate(180%);
  -webkit-backdrop-filter:blur(24px) saturate(180%);
  border-bottom:1px solid var(--glass-border);
}
.nav-logo{
  font-size:1.15rem;font-weight:700;color:var(--text-bright);
  text-decoration:none;letter-spacing:-0.5px;
  display:flex;align-items:center;gap:10px;
}
.nav-logo span{color:var(--gold);font-weight:300}
.nav-actions{display:flex;align-items:center;gap:12px}
.nav-btn{
  background:var(--glass);border:1px solid var(--glass-border);
  color:var(--text-dim);border-radius:100px;
  padding:8px 18px;font-size:0.78rem;font-weight:500;
  cursor:pointer;transition:var(--transition);
  font-family:inherit;display:flex;align-items:center;gap:7px;
}
.nav-btn:hover{color:var(--text);border-color:var(--gold);background:var(--glass-hover)}
.cart-badge{
  background:var(--accent);color:#fff;
  border-radius:50%;width:20px;height:20px;
  font-size:0.65rem;font-weight:700;
  display:flex;align-items:center;justify-content:center;
}

/* HERO */
.hero{
  position:relative;z-index:1;
  padding:140px 32px 80px;text-align:center;
}
.hero-badge{
  display:inline-flex;align-items:center;gap:6px;
  padding:5px 16px;
  background:var(--glass);backdrop-filter:blur(16px);
  border:1px solid var(--glass-border);border-radius:100px;
  color:var(--gold);font-size:0.65rem;font-weight:500;
  letter-spacing:2px;text-transform:uppercase;margin-bottom:20px;
}
.hero h1{
  font-size:4rem;font-weight:800;line-height:1.05;
  letter-spacing:-2px;color:var(--text-bright);
  margin-bottom:14px;
}
.hero h1 em{color:var(--gold);font-style:normal}
.hero p{
  font-size:0.95rem;color:var(--text-dim);
  max-width:460px;margin:0 auto 28px;font-weight:300;
}
.hero-search{
  max-width:500px;margin:0 auto;
  position:relative;
}
.hero-search input{
  width:100%;padding:14px 20px 14px 46px;
  background:var(--glass);border:1px solid var(--glass-border);
  border-radius:100px;color:var(--text);font-size:0.9rem;
  outline:none;transition:var(--transition);
  font-family:inherit;
}
.hero-search input::placeholder{color:var(--text-dim)}
.hero-search input:focus{border-color:var(--gold);background:var(--glass-hover)}
.hero-search .search-icon{
  position:absolute;left:18px;top:50%;transform:translateY(-50%);
  color:var(--text-dim);font-size:0.9rem;
}

/* FILTERS */
.filters{
  position:relative;z-index:1;
  padding:0 32px 20px;
  display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  max-width:1320px;margin:0 auto;
}
.filter-btn{
  padding:6px 18px;
  background:var(--glass);border:1px solid var(--glass-border);
  border-radius:100px;color:var(--text-dim);
  font-size:0.72rem;font-weight:500;cursor:pointer;
  transition:var(--transition);font-family:inherit;
}
.filter-btn.active,.filter-btn:hover{
  border-color:var(--gold);color:var(--gold);background:rgba(212,165,116,0.08);
}
.sort-select{
  margin-left:auto;padding:6px 16px;
  background:var(--glass);border:1px solid var(--glass-border);
  border-radius:100px;color:var(--text-dim);
  font-size:0.72rem;font-weight:500;cursor:pointer;
  transition:var(--transition);font-family:inherit;outline:none;
}
.sort-select:hover,.sort-select:focus{border-color:var(--gold);color:var(--text)}
.sort-select option{background:#0a0806;color:var(--text)}
.count-label{
  font-size:0.72rem;color:var(--text-dim);
  margin-left:8px;font-weight:400;
}

/* PRODUCT GRID */
.products-section{
  position:relative;z-index:1;
  padding:0 32px 60px;
  max-width:1320px;margin:0 auto;
}
.products-grid{
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:12px;
}
@media(max-width:1100px){.products-grid{grid-template-columns:repeat(5,1fr)}}
@media(max-width:900px){.products-grid{grid-template-columns:repeat(4,1fr)}}
@media(max-width:700px){.products-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:480px){.products-grid{grid-template-columns:repeat(2,1fr)}}

/* PRODUCT CARD */
.prod-card{
  background:var(--card-bg);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  border-radius:var(--radius);
  border:1px solid var(--glass-border);
  overflow:hidden;
  transition:all 0.45s cubic-bezier(0.16,1,0.3,1);
  cursor:pointer;
  position:relative;
  opacity:0;transform:translateY(20px);
}
.prod-card.visible{opacity:1;transform:translateY(0)}
.prod-card:hover{
  transform:translateY(-4px);
  border-color:rgba(212,165,116,0.25);
  box-shadow:0 12px 40px rgba(0,0,0,0.3),0 0 20px rgba(212,165,116,0.04);
  background:rgba(255,255,255,0.06);
}
.prod-card.selected{
  border-color:var(--gold);
  box-shadow:0 0 0 1px var(--gold),0 12px 40px rgba(212,165,116,0.1);
}
.prod-img{
  width:100%;aspect-ratio:1;
  background:linear-gradient(135deg,#100a04,#1a0e06);
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
  padding:18%;
}
.prod-img svg{width:100%;height:100%;transition:transform 0.5s ease}
.prod-card:hover .prod-img svg{transform:scale(1.06) rotate(1deg)}
.prod-badge{
  position:absolute;top:8px;left:8px;
  background:rgba(232,106,58,0.9);
  backdrop-filter:blur(8px);
  color:#fff;border-radius:100px;
  padding:3px 10px;font-size:0.6rem;font-weight:600;
  letter-spacing:0.3px;
}
.prod-fav{
  position:absolute;top:8px;right:8px;
  background:var(--glass);border:1px solid var(--glass-border);
  backdrop-filter:blur(8px);
  border-radius:50%;width:30px;height:30px;
  display:flex;align-items:center;justify-content:center;
  font-size:0.75rem;cursor:pointer;
  transition:var(--transition);line-height:1;
}
.prod-fav:hover{transform:scale(1.15);border-color:var(--gold)}
.prod-body{padding:12px 14px 14px}
.prod-tag{font-size:0.6rem;color:var(--gold);font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.prod-name{font-size:0.82rem;font-weight:600;color:var(--text-bright);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prod-desc{font-size:0.68rem;color:var(--text-dim);line-height:1.5;margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.prod-foot{display:flex;align-items:center;justify-content:space-between}
.prod-price{font-size:1.05rem;font-weight:700;color:var(--gold)}
.prod-price sub{font-size:0.6rem;color:var(--text-dim);font-weight:400}
.prod-add{
  width:32px;height:32px;
  background:linear-gradient(135deg,var(--gold),#b8854a);
  border:none;border-radius:50%;
  color:#fff;font-size:1.1rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:var(--transition);
  box-shadow:0 3px 12px var(--gold-dim);
}
.prod-add:hover{transform:scale(1.15) rotate(90deg);box-shadow:0 5px 20px var(--gold-dim)}

/* SELECTION TOOLBAR */
.selection-toolbar{
  position:fixed;bottom:0;left:0;right:0;z-index:90;
  background:rgba(10,8,6,0.85);
  backdrop-filter:blur(24px);
  border-top:1px solid var(--glass-border);
  padding:14px 32px;
  display:flex;align-items:center;justify-content:space-between;
  transform:translateY(100%);transition:var(--transition);
}
.selection-toolbar.show{transform:translateY(0)}
.sel-info{font-size:0.85rem;color:var(--text-dim)}
.sel-info strong{color:var(--gold)}
.sel-actions{display:flex;gap:10px}
.sel-btn{
  padding:8px 20px;border-radius:100px;border:1px solid var(--glass-border);
  background:var(--glass);color:var(--text);font-size:0.78rem;
  cursor:pointer;transition:var(--transition);font-family:inherit;font-weight:500;
}
.sel-btn:hover{background:var(--glass-hover);border-color:var(--gold)}
.sel-btn.primary{background:var(--accent);border-color:transparent;color:#fff}
.sel-btn.primary:hover{opacity:0.9}
.sel-btn.danger{color:#ff6b6b;border-color:rgba(255,107,107,0.3)}
.sel-btn.danger:hover{background:rgba(255,107,107,0.1)}

/* MODAL */
.modal-overlay{
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,0.6);backdrop-filter:blur(12px);
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity 0.35s;
}
.modal-overlay.active{opacity:1;pointer-events:all}
.modal{
  background:rgba(16,12,8,0.95);
  border:1px solid var(--glass-border);
  border-radius:20px;max-width:680px;width:92vw;
  display:flex;overflow:hidden;max-height:88vh;
  box-shadow:0 40px 100px rgba(0,0,0,0.5);
  transform:scale(0.92) translateY(20px);
  transition:transform 0.4s cubic-bezier(0.16,1,0.3,1);
}
.modal-overlay.active .modal{transform:scale(1) translateY(0)}
.modal-visual{
  width:260px;min-width:260px;
  background:linear-gradient(135deg,#120a04,#1e1208);
  display:flex;align-items:center;justify-content:center;
  padding:24px;position:relative;
}
.modal-visual svg{width:200px;height:200px;animation:floatModal 3.5s ease-in-out infinite}
@keyframes floatModal{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.modal-close{
  position:absolute;top:12px;right:12px;
  background:var(--glass);border:1px solid var(--glass-border);
  color:var(--text-dim);font-size:0.9rem;cursor:pointer;
  width:30px;height:30px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  transition:var(--transition);
}
.modal-close:hover{color:var(--text);border-color:var(--gold)}
.modal-body{padding:28px 28px;overflow-y:auto;flex:1}
.modal-tag{font-size:0.6rem;color:var(--gold);font-weight:600;letter-spacing:2px;text-transform:uppercase}
.modal-name{font-size:1.6rem;font-weight:700;color:var(--text-bright);margin:6px 0 10px}
.modal-desc{color:var(--text-dim);font-size:0.85rem;line-height:1.7;margin-bottom:18px}
.modal-specs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
.spec{
  background:var(--glass);border:1px solid var(--glass-border);
  border-radius:10px;padding:8px 14px;text-align:center;
  backdrop-filter:blur(8px);min-width:70px;
}
.spec-val{font-weight:600;font-size:0.85rem;color:var(--gold)}
.spec-lbl{font-size:0.62rem;color:var(--text-dim);margin-top:2px}
.qty-row{display:flex;align-items:center;gap:14px;margin-bottom:16px}
.qty-ctrl{
  display:flex;align-items:center;
  border:1px solid var(--glass-border);border-radius:100px;
  overflow:hidden;backdrop-filter:blur(8px);background:var(--glass);
}
.qty-btn{
  background:none;border:none;color:var(--text);
  width:36px;height:36px;font-size:1rem;
  cursor:pointer;font-weight:700;transition:background 0.2s;
  font-family:inherit;
}
.qty-btn:hover{background:var(--glass-hover)}
.qty-num{width:36px;text-align:center;font-weight:600;color:var(--gold);font-size:0.9rem}
.modal-price{font-size:1.5rem;font-weight:700;color:var(--gold)}
.modal-add-btn{
  width:100%;
  background:linear-gradient(135deg,#b8854a,var(--gold));
  color:#fff;border:none;border-radius:100px;
  padding:14px;font-size:0.88rem;font-weight:600;
  cursor:pointer;transition:var(--transition);
  box-shadow:0 5px 20px var(--gold-dim);
  font-family:inherit;
}
.modal-add-btn:hover{opacity:0.92;transform:translateY(-2px)}

/* CART */
.cart-drawer{
  position:fixed;right:0;top:0;bottom:0;
  width:380px;z-index:300;
  background:rgba(12,10,8,0.97);
  backdrop-filter:blur(24px);
  border-left:1px solid var(--glass-border);
  transform:translateX(100%);
  transition:transform 0.4s cubic-bezier(0.16,1,0.3,1);
  display:flex;flex-direction:column;
  box-shadow:-12px 0 60px rgba(0,0,0,0.5);
}
.cart-drawer.open{transform:translateX(0)}
.cart-head{
  border-bottom:1px solid var(--glass-border);
  padding:18px 22px;
  display:flex;align-items:center;justify-content:space-between;
}
.cart-head h3{font-size:1.1rem;color:var(--text-bright);font-weight:600}
.cart-x{
  background:var(--glass);border:1px solid var(--glass-border);
  color:var(--text-dim);border-radius:50%;width:32px;height:32px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:var(--transition);
}
.cart-x:hover{border-color:var(--gold);color:var(--text)}
.cart-body{flex:1;overflow-y:auto;padding:14px}
.cart-item{
  display:flex;align-items:center;gap:10px;
  background:var(--glass);border:1px solid var(--glass-border);
  border-radius:12px;padding:10px 12px;margin-bottom:8px;
  transition:var(--transition);
}
.cart-item:hover{border-color:rgba(212,165,116,0.2)}
.ci-img{
  width:44px;height:44px;border-radius:8px;
  background:linear-gradient(135deg,#100a04,#1a0e06);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.ci-img svg{width:34px;height:34px}
.ci-info{flex:1;min-width:0}
.ci-name{font-weight:600;font-size:0.82rem;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ci-price{font-size:0.75rem;color:var(--gold);font-weight:600;margin-top:2px}
.ci-qty{display:flex;align-items:center;gap:6px;flex-shrink:0}
.cqb{
  background:var(--glass);border:1px solid var(--glass-border);
  border-radius:50%;width:26px;height:26px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:0.8rem;font-weight:700;color:var(--text);
  transition:var(--transition);
}
.cqb:hover{background:var(--glass-hover);border-color:var(--gold)}
.ci-qnum{font-weight:600;color:var(--gold);min-width:16px;text-align:center;font-size:0.85rem}
.cart-empty{text-align:center;padding:60px 20px;color:var(--text-dim)}
.cart-empty .ce-icon{font-size:3rem;display:block;margin-bottom:10px;opacity:0.4}
.cart-footer{padding:16px 20px;border-top:1px solid var(--glass-border)}
.cart-total{
  display:flex;justify-content:space-between;
  font-size:0.95rem;font-weight:600;color:var(--text);margin-bottom:12px;
}
.cart-total-price{color:var(--gold)}
.checkout-btn{
  width:100%;
  background:linear-gradient(135deg,#b8854a,var(--gold));
  color:#fff;border:none;border-radius:100px;
  padding:14px;font-size:0.85rem;font-weight:600;
  cursor:pointer;transition:var(--transition);
  font-family:inherit;
}
.checkout-btn:hover{opacity:0.92;transform:translateY(-2px)}
.cart-notes{
  margin-top:10px;
}
.cart-notes textarea{
  width:100%;padding:10px 14px;
  background:var(--glass);border:1px solid var(--glass-border);
  border-radius:10px;color:var(--text-dim);
  font-size:0.75rem;outline:none;resize:none;
  font-family:inherit;transition:var(--transition);
}
.cart-notes textarea:focus{border-color:var(--gold);color:var(--text)}

/* TOAST */
.toast{
  position:fixed;bottom:28px;left:50%;
  transform:translateX(-50%) translateY(80px);
  background:rgba(16,12,8,0.95);
  border:1px solid var(--glass-border);
  color:var(--text);border-radius:100px;
  padding:12px 24px;font-size:0.82rem;font-weight:500;
  z-index:500;transition:transform 0.4s cubic-bezier(0.16,1,0.3,1);
  backdrop-filter:blur(20px);white-space:nowrap;
  box-shadow:0 8px 30px rgba(0,0,0,0.4);
}
.toast.show{transform:translateX(-50%) translateY(0)}

/* FAVORITES FILTER */
.filter-group{display:flex;align-items:center;gap:8px;margin-left:auto}
.fav-filter-btn{
  padding:6px 14px;border-radius:100px;border:1px solid var(--glass-border);
  background:var(--glass);color:var(--text-dim);font-size:0.7rem;
  cursor:pointer;transition:var(--transition);font-family:inherit;
}
.fav-filter-btn.active{color:#ff6b6b;border-color:#ff6b6b;background:rgba(255,107,107,0.08)}
.fav-filter-btn:hover{border-color:var(--gold)}
@media(max-width:800px){
  .filter-group{margin-left:0;width:100%;order:10}
  .sort-select{margin-left:0}
}

/* COMPARE PANEL */
.compare-panel{
  position:fixed;bottom:80px;right:24px;z-index:80;
  background:rgba(12,10,8,0.95);
  backdrop-filter:blur(20px);
  border:1px solid var(--glass-border);
  border-radius:16px;padding:16px 20px;
  min-width:240px;
  transform:translateY(120px);opacity:0;
  transition:var(--transition);pointer-events:none;
}
.compare-panel.show{transform:translateY(0);opacity:1;pointer-events:all}
.compare-panel h4{font-size:0.8rem;color:var(--text-bright);margin-bottom:10px;font-weight:600}
.compare-items{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.compare-chip{
  background:var(--glass);border:1px solid var(--glass-border);
  border-radius:100px;padding:4px 12px;font-size:0.7rem;
  color:var(--text-dim);display:flex;align-items:center;gap:6px;
}
.compare-chip .remove-chip{cursor:pointer;color:#ff6b6b;font-size:0.8rem;line-height:1}
.compare-btn{
  width:100%;padding:8px;
  background:var(--glass);border:1px solid var(--glass-border);
  border-radius:100px;color:var(--gold);font-size:0.75rem;
  cursor:pointer;transition:var(--transition);font-family:inherit;
}
.compare-btn:hover{background:var(--glass-hover);border-color:var(--gold)}

/* EMPTY / NOT FOUND */
.not-found{text-align:center;padding:60px 20px;color:var(--text-dim);grid-column:1/-1}
.not-found .nf-icon{font-size:3rem;display:block;margin-bottom:12px;opacity:0.4}

/* FOOTER */
footer{
  position:relative;z-index:1;
  padding:28px 32px;text-align:center;
  color:var(--text-dim);font-size:0.72rem;
  border-top:1px solid var(--glass-border);
}

/* SCROLLBAR */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--glass-strong);border-radius:10px}
</style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<!-- NAV -->
<nav>
  <a href="#" class="nav-logo">ZIYOKOR <span>NONLARI</span></a>
  <div class="nav-actions">

// ======== ENHANCED SVG BREAD GENERATOR (30 unique variants) ========
function breadSVG(size, variant) {
  const palettes = [
    { o:'#C89050',m:'#A87030',i:'#906030',c:'#7A4020'},
    { o:'#D4A060',m:'#B88040',i:'#A07030',c:'#886020'},
    { o:'#C08848',m:'#A06830',i:'#8A5428',c:'#723C18'},
    { o:'#DCA870',m:'#C08850',i:'#A87040',c:'#906030'},
    { o:'#B87840',m:'#985820',i:'#804818',c:'#683410'},
    { o:'#CAA060',m:'#AC8040',i:'#946830',c:'#7C5020'},
    { o:'#D4A878',m:'#B89050',i:'#987038',c:'#785020'},
    { o:'#C89840',m:'#A07828',i:'#886020',c:'#704818'},
    { o:'#DEB078',m:'#C89850',i:'#A88040',c:'#886830'},
    { o:'#B88048',m:'#986830',i:'#805020',c:'#683810'},
  ];

  const p = palettes[variant % palettes.length];
  const s = size, cx = s/2, cy = s/2;
  const r = s * 0.43, ri = s * 0.26;

  const linesA = Math.floor(12 + (variant % 5) * 2);
  const lines = Array.from({length:linesA},(_,i)=>{
    const a = (i/linesA)*Math.PI*2;
    return `<line x1="${cx}" y1="${cy}" x2="${cx+Math.cos(a)*r*0.97}" y2="${cy+Math.sin(a)*r*0.97}" stroke="${p.c}" stroke-width="0.7" opacity="0.5"/>`;
  }).join('');

  const p12c = 10 + (variant % 4);
  const petals12 = Array.from({length:p12c},(_,i)=>{
    const a = (i/p12c)*Math.PI*2, px=cx+Math.cos(a)*ri*0.72, py=cy+Math.sin(a)*ri*0.72;
    return `<ellipse cx="${px}" cy="${py}" rx="${s*0.04}" ry="${s*0.08}" transform="rotate(${i/p12c*360},${px},${py})" fill="${p.c}" opacity="0.8"/>`;
  }).join('');

  const p8c = 6 + (variant % 4);
  const petals8 = Array.from({length:p8c},(_,i)=>{
    const a = (i/p8c)*Math.PI*2, px=cx+Math.cos(a)*ri*0.38, py=cy+Math.sin(a)*ri*0.38;
    return `<ellipse cx="${px}" cy="${py}" rx="${s*0.025}" ry="${s*0.05}" transform="rotate(${i/p8c*360},${px},${py})" fill="${p.c}" opacity="0.85"/>`;
  }).join('');

  const seedCount = 6 + (variant % 8);
  const seeds = (()=>{
    let res='';
    for(let i=0;i<seedCount;i++){
      const angle = Math.random()*Math.PI*2, dist = ri*0.3+Math.random()*ri*0.5;
      const fill = Math.random()<0.4 ? '#1a0808' : '#f0ddb0';
      res += `<ellipse cx="${cx+Math.cos(angle)*dist}" cy="${cy+Math.sin(angle)*dist}" rx="${s*0.014}" ry="${s*0.008}" fill="${fill}" opacity="0.8"/>`;
    }
    return res;
  })();

  const hasBorder = variant % 3 !== 0;
  const borderStroke = hasBorder ? `stroke="url(#rg${variant})" stroke-width="${r*0.25}"` : '';

  return `<svg viewBox="0 0 ${s} ${s}" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient id="rg${variant}" cx="38%" cy="32%" r="68%">
        <stop offset="0%" stop-color="${p.o}"/>
        <stop offset="45%" stop-color="${p.m}"/>
        <stop offset="100%" stop-color="${p.i}"/>
      </radialGradient>
      <radialGradient id="ig${variant}" cx="50%" cy="44%" r="58%">
        <stop offset="0%" stop-color="${p.m}"/>
        <stop offset="65%" stop-color="${p.i}"/>
        <stop offset="100%" stop-color="${p.c}"/>
      </radialGradient>
    </defs>
    <ellipse cx="${cx}" cy="${cy+r*0.85}" rx="${r*0.88}" ry="${r*0.12}" fill="rgba(20,8,0,0.3)"/>
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="url(#rg${variant})" opacity="0.95"/>
    <circle cx="${cx}" cy="${cy}" r="${r}" ${borderStroke} opacity="0.75"/>
    <circle cx="${cx}" cy="${cy}" r="${ri}" fill="url(#ig${variant})"/>
    ${lines}
    <circle cx="${cx}" cy="${cy}" r="${ri*0.6}" fill="${p.i}"/>
    ${petals12}
    ${petals8}
    <circle cx="${cx}" cy="${cy}" r="${ri*0.18}" fill="${p.c}" opacity="0.85"/>
    ${seeds}
  </svg>`;
}

// ======== STATE ========
let cart = [];
let favorites = new Set(JSON.parse(localStorage.getItem('favs')||'[]'));
let selected = new Set();
let currentProd = null, currentQty = 1;
let activeFilter = 'all', showFavOnly = false;
let compareList = [];

// ======== RENDER ========
function renderProducts() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  const sort = document.getElementById('sortSelect').value;

  let filtered = products.filter(p => {
    if (activeFilter !== 'all' && p.cat !== activeFilter) return false;
    if (showFavOnly && !favorites.has(p.id)) return false;
    if (q && !p.name.toLowerCase().includes(q) && !p.tag.toLowerCase().includes(q) && !p.desc.toLowerCase().includes(q)) return false;
    return true;
  });

  if (sort === 'price-asc') filtered.sort((a,b) => a.price - b.price);
  else if (sort === 'price-desc') filtered.sort((a,b) => b.price - a.price);
  else if (sort === 'name') filtered.sort((a,b) => a.name.localeCompare(b.name));

  document.getElementById('countLabel').textContent = `${filtered.length} ta mahsulot`;

  const grid = document.getElementById('productsGrid');
  if (!filtered.length) {
    grid.innerHTML = '<div class="not-found"><span class="nf-icon">🔍</span>Hech narsa topilmadi</div>';
    return;
  }

  grid.innerHTML = filtered.map((p,i) => {
    const isFav = favorites.has(p.id);
    const isSel = selected.has(p.id);
    const badgeColor = p.badge.includes('Premium') ? 'rgba(212,165,116,0.9)' :
                       p.badge.includes('Bestseller') ? 'rgba(232,106,58,0.9)' :
                       p.badge.includes('Organik') ? 'rgba(100,200,100,0.9)' :
                       p.badge.includes('Yangi') ? 'rgba(100,180,255,0.9)' :
                       p.badge.includes('Tejam') ? 'rgba(255,200,50,0.9)' :
                       'rgba(232,106,58,0.9)';
    return `
    <div class="prod-card ${isSel?'selected':''}" onclick="toggleSelect(${p.id})" style="transition-delay:${i*30}ms">
      <div class="prod-img">
        ${p.badge ? `<span class="prod-badge" style="background:${badgeColor}">${p.badge}</span>` : ''}
        <button class="prod-fav" onclick="event.stopPropagation();toggleFav(${p.id},this)" data-fav="${isFav}">${isFav?'❤️':'🤍'}</button>
        ${breadSVG(140, p.id)}
      </div>
      <div class="prod-body">
        <div class="prod-tag">${p.tag}</div>
        <div class="prod-name">${p.name}</div>
        <div class="prod-desc">${p.desc.slice(0,50)}..</div>
        <div class="prod-foot">
          <span class="prod-price">${p.price.toLocaleString()} <sub>so'm</sub></span>
          <button class="prod-add" onclick="event.stopPropagation();quickAdd(${p.id})" title="Savatga qo'shish">+</button>
        </div>
      </div>
    </div>`;
  }).join('');

  const cardObs = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) { e.target.classList.add('visible'); cardObs.unobserve(e.target); }
    });
  }, { threshold: 0.05 });
  grid.querySelectorAll('.prod-card').forEach(c => cardObs.observe(c));
}

function filterCat(cat, btn) {
  activeFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderProducts();
}

// ======== SELECTION ========
function toggleSelect(id) {
  if (selected.has(id)) selected.delete(id);
  else selected.add(id);
  updateSelectionUI();
  renderProducts();
}

function updateSelectionUI() {
  const tb = document.getElementById('selectionToolbar');
  const count = selected.size;
  tb.classList.toggle('show', count > 0);
  document.getElementById('selCount').textContent = count;
}

function clearSelection() {
  selected.clear();
  updateSelectionUI();
  renderProducts();
}

function addSelectedToCart() {
  selected.forEach(id => addToCart(products.find(p => p.id === id), 1));
  showToast(`✅ ${selected.size} ta non savatga qo'shildi!`);
  clearSelection();
}

function compareSelected() {
  if (selected.size < 2) { showToast('⚠️ Kamida 2 ta non tanlang'); return; }
  compareList = [...selected];
  selected.clear();
  updateSelectionUI();
  renderProducts();
  const panel = document.getElementById('comparePanel');
  document.getElementById('compareItems').innerHTML = compareList.map(id =>
    `<span class="compare-chip">${products.find(p=>p.id===id).name} <span class="remove-chip" onclick="removeCompare(${id})">✕</span></span>`
  ).join('');
  panel.classList.add('show');
}

function removeCompare(id) {
  compareList = compareList.filter(x => x !== id);
  if (compareList.length < 2) { document.getElementById('comparePanel').classList.remove('show'); return; }
  document.getElementById('compareItems').innerHTML = compareList.map(id =>
    `<span class="compare-chip">${products.find(p=>p.id===id).name} <span class="remove-chip" onclick="removeCompare(${id})">✕</span></span>`
  ).join('');
}

function showCompareModal() {
  const items = compareList.map(id => products.find(p => p.id === id));
  let html = '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;padding:24px">';
  items.forEach(p => {
    html += `<div style="background:var(--glass);border:1px solid var(--glass-border);border-radius:12px;padding:16px;text-align:center">
      ${breadSVG(100, p.id)}
      <div style="font-size:1rem;font-weight:600;color:var(--text);margin:8px 0 4px">${p.name}</div>
      <div style="font-size:0.85rem;color:var(--gold)">${p.price.toLocaleString()} so'm</div>
      <div style="font-size:0.72rem;color:var(--text-dim);margin-top:4px">${p.weight} · ${p.cal}</div>
      <div style="font-size:0.72rem;color:var(--text-dim)">${p.shelf}</div>
      <div style="font-size:0.7rem;color:var(--text-dim);margin-top:6px">${p.desc}</div>
    </div>`;
  });
  html += '</div>';
  showCustomModal('📊 Taqqoslash', html);
}

function showCustomModal(title, body) {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay active';
  overlay.style.cssText = 'position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.6);backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:center';
  overlay.innerHTML = `<div style="background:rgba(16,12,8,0.97);border:1px solid var(--glass-border);border-radius:20px;max-width:600px;width:92vw;max-height:85vh;overflow-y:auto;box-shadow:0 40px 100px rgba(0,0,0,0.5);padding:24px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <h3 style="font-size:1.2rem;color:var(--text-bright)">${title}</h3>
      <button onclick="this.closest('.modal-overlay').remove()" style="background:var(--glass);border:1px solid var(--glass-border);color:var(--text-dim);border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:0.9rem">✕</button>
    </div>
    ${body}
  </div>`;
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
  document.body.appendChild(overlay);
}

// ======== FAVORITES ========
function toggleFav(id, btn) {
  if (favorites.has(id)) { favorites.delete(id); if (btn) btn.textContent = '🤍'; btn?.setAttribute('data-fav','false'); }
  else { favorites.add(id); if (btn) btn.textContent = '❤️'; btn?.setAttribute('data-fav','true'); }
  localStorage.setItem('favs', JSON.stringify([...favorites]));
  if (showFavOnly) renderProducts();
}

function toggleFavFilter() {
  showFavOnly = !showFavOnly;
  document.getElementById('favFilterBtn').style.borderColor = showFavOnly ? '#ff6b6b' : '';
  renderProducts();
}

// ======== MODAL ========
function openModal(id) {
  currentProd = products.find(p => p.id === id);
  currentQty = 1;
  const vis = document.getElementById('modalVisual');
  vis.innerHTML = `<button class="modal-close" onclick="closeModal()">✕</button>${breadSVG(220, currentProd.id)}`;
  document.getElementById('mTag').textContent = currentProd.tag;
  document.getElementById('mName').textContent = currentProd.name;
  document.getElementById('mDesc').textContent = currentProd.desc;
  document.getElementById('mSpecs').innerHTML = `
    <div class="spec"><div class="spec-val">${currentProd.weight}</div><div class="spec-lbl">Og'irlik</div></div>
    <div class="spec"><div class="spec-val">${currentProd.cal}</div><div class="spec-lbl">Kaloriya</div></div>
    <div class="spec"><div class="spec-val">${currentProd.shelf}</div><div class="spec-lbl">Saqlash</div></div>
    <div class="spec"><div class="spec-val">${currentProd.price.toLocaleString()}</div><div class="spec-lbl">Narxi</div></div>
  `;
  document.getElementById('qtyNum').textContent = 1;
  updateModalPrice();
  document.getElementById('modalOverlay').classList.add('active');
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('active'); }
function closeModalBg(e) { if (e.target === document.getElementById('modalOverlay')) closeModal(); }
function chQty(d) { currentQty = Math.max(1, currentQty + d); document.getElementById('qtyNum').textContent = currentQty; updateModalPrice(); }
function updateModalPrice() { if (!currentProd) return; document.getElementById('mPrice').textContent = (currentProd.price * currentQty).toLocaleString() + ' so\'m'; }
function addFromModal() { addToCart(currentProd, currentQty); closeModal(); }

// ======== CART ========
function quickAdd(id) { addToCart(products.find(p => p.id === id), 1); showToast(`✅ ${products.find(p=>p.id===id).name} savatga qo'shildi!`); }

function addToCart(prod, qty) {
  const ex = cart.find(x => x.id === prod.id);
  if (ex) ex.qty += qty;
  else cart.push({ ...prod, qty });
  updateBadge();
  renderCartBody();
}

function updateBadge() { document.getElementById('cartBadge').textContent = cart.reduce((s, x) => s + x.qty, 0); }

function renderCartBody() {
  const el = document.getElementById('cartBody');
  if (!cart.length) {
    el.innerHTML = '<div class="cart-empty"><span class="ce-icon">🛒</span>Savat bo\'sh</div>';
    document.getElementById('cartTotal').textContent = '0 so\'m';
    return;
  }
  el.innerHTML = cart.map(item => `
    <div class="cart-item">
      <div class="ci-img">${breadSVG(40, item.id)}</div>
      <div class="ci-info">
        <div class="ci-name">${item.name}</div>
        <div class="ci-price">${(item.price*item.qty).toLocaleString()} so'm</div>
      </div>
      <div class="ci-qty">
        <button class="cqb" onclick="updQty(${item.id},-1)">−</button>
        <span class="ci-qnum">${item.qty}</span>
        <button class="cqb" onclick="updQty(${item.id},1)">+</button>
      </div>
    </div>
  `).join('');
  const total = cart.reduce((s, x) => s + x.price * x.qty, 0);
  document.getElementById('cartTotal').textContent = total.toLocaleString() + ' so\'m';
}

function updQty(id, d) {
  const idx = cart.findIndex(x => x.id === id);
  if (idx === -1) return;
  cart[idx].qty += d;
  if (cart[idx].qty <= 0) cart.splice(idx, 1);
  updateBadge(); renderCartBody();
}

function openCart() { renderCartBody(); document.getElementById('cartDrawer').classList.add('open'); }
function closeCart() { document.getElementById('cartDrawer').classList.remove('open'); }

function checkout() {
  if (!cart.length) { showToast('⚠️ Savat bo\'sh'); return; }
  const note = document.getElementById('orderNote').value.trim();
  let msg = '🎉 Buyurtmangiz qabul qilindi!';
  const total = cart.reduce((s, x) => s + x.price * x.qty, 0);
  let orderText = 'Assalomu alaykum! Men buyurtma bermoqchiman:\n';
  cart.forEach(x => { orderText += `- ${x.name} x${x.qty} = ${(x.price*x.qty).toLocaleString()} so'm\n`; });
  orderText += `\nJami: ${total.toLocaleString()} so'm`;
  if (note) orderText += `\n\nEslatma: ${note}`;
  const encoded = encodeURIComponent(orderText);
  window.open(`https://wa.me/998993921157?text=${encoded}`, '_blank');
  showToast(msg);
  cart = []; updateBadge(); renderCartBody(); closeCart();
  document.getElementById('orderNote').value = '';
}

// ======== TOAST ========
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

// ======== INIT ========
(function() {
  renderProducts();
  document.getElementById('searchInput').addEventListener('keydown', e => {
    if (e.key === 'Escape') { e.target.value = ''; renderProducts(); }
  });
})();
</script>
</body>
