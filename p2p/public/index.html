<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ZIYOKOR NONLARI — GPS P2P Marketplace</title>
<script src="/gun/gun.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --glass:rgba(255,255,255,0.05);
  --glass-border:rgba(255,255,255,0.08);
  --glass-hover:rgba(255,255,255,0.1);
  --text:#f0ece6;
  --text-dim:rgba(240,236,230,0.5);
  --text-bright:#fff;
  --gold:#d4a574;
  --gold-dim:rgba(212,165,116,0.3);
  --accent:#e86a3a;
  --green:#4caf50;
  --blue:#42a5f5;
  --purple:#ab47bc;
  --orange:#ffa726;
  --bg:#0a0806;
  --card:rgba(255,255,255,0.04);
  --radius:16px;
  --transition:all 0.3s cubic-bezier(0.16,1,0.3,1);
}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;line-height:1.5;min-height:100dvh;padding-bottom:100px}

.btn{padding:10px 22px;border-radius:100px;border:none;font-size:0.8rem;font-weight:600;cursor:pointer;transition:var(--transition);font-family:inherit;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:linear-gradient(135deg,#b8854a,var(--gold));color:#fff}
.btn-primary:hover{opacity:0.9}
.btn-ghost{background:var(--glass);border:1px solid var(--glass-border);color:var(--text-dim)}
.btn-ghost:hover{color:var(--text);border-color:var(--gold)}
.btn-success{background:var(--green);color:#fff}
.btn-danger{background:rgba(255,107,107,0.15);color:#ff6b6b;border:1px solid rgba(255,107,107,0.3)}
.btn-sm{padding:6px 14px;font-size:0.7rem}

.card{background:var(--card);border:1px solid var(--glass-border);border-radius:var(--radius);padding:16px}
input,select,textarea{background:var(--glass);border:1px solid var(--glass-border);border-radius:10px;color:var(--text);padding:10px 14px;font-size:0.85rem;outline:none;width:100%;font-family:inherit;transition:var(--transition)}
input:focus,select:focus,textarea:focus{border-color:var(--gold)}
select option{background:#0a0806}
label{font-size:0.75rem;color:var(--text-dim);margin-bottom:4px;display:block}

.nav{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:rgba(10,8,6,0.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--glass-border);position:sticky;top:0;z-index:1000}
.nav-logo{font-size:0.95rem;font-weight:700;color:var(--text-bright);display:flex;align-items:center;gap:8px}
.nav-logo span{color:var(--gold)}
.nav-info{display:flex;align-items:center;gap:10px;font-size:0.7rem;color:var(--text-dim)}

.tab-bar{display:flex;background:rgba(255,255,255,0.02);border-bottom:1px solid var(--glass-border);position:sticky;top:48px;z-index:999;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab-btn{padding:10px 18px;font-size:0.72rem;font-weight:500;color:var(--text-dim);background:none;border:none;cursor:pointer;white-space:nowrap;font-family:inherit;border-bottom:2px solid transparent;transition:var(--transition)}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold)}

.content{padding:16px;max-width:1000px;margin:0 auto}
.section-title{font-size:1.15rem;font-weight:700;color:var(--text-bright);margin-bottom:4px}
.section-sub{color:var(--text-dim);font-size:0.75rem;margin-bottom:16px}

.empty-state{text-align:center;padding:60px 20px;color:var(--text-dim)}
.empty-state .icon{font-size:3.5rem;display:block;margin-bottom:12px;opacity:0.35}
.empty-state p{font-size:0.85rem;margin-bottom:6px}
.empty-state .hint{font-size:0.68rem;opacity:0.6}

.grid-3{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
.prod-name{font-size:0.82rem;font-weight:600;color:var(--text-bright);margin-top:6px}
.prod-price{font-size:0.9rem;font-weight:700;color:var(--gold)}
.prod-price sub{font-size:0.55rem;color:var(--text-dim);font-weight:400}

.bakery-item{display:flex;align-items:center;gap:12px;padding:12px 14px}
.bakery-icon{width:44px;height:44px;border-radius:10px;background:linear-gradient(135deg,#1a1006,#2a1a0a);display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0}
.bakery-info{flex:1}
.bakery-name{font-size:0.85rem;font-weight:600;color:var(--text-bright)}
.bakery-detail{font-size:0.68rem;color:var(--text-dim);margin-top:2px}

.status-badge{font-size:0.6rem;padding:3px 10px;border-radius:100px;font-weight:600;display:inline-block}
.status-pending{background:rgba(255,193,7,0.15);color:#ffc107}
.status-accepted{background:rgba(66,165,245,0.15);color:var(--blue)}
.status-baking{background:rgba(212,165,116,0.15);color:var(--gold)}
.status-ready{background:rgba(76,175,80,0.15);color:var(--green)}
.status-delivering{background:rgba(255,167,38,0.15);color:var(--orange)}
.status-delivered{background:rgba(76,175,80,0.25);color:#81c784}
.status-rejected{background:rgba(255,107,107,0.15);color:#ff6b6b}

.modal-overlay{position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,0.6);backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.3s}
.modal-overlay.active{opacity:1;pointer-events:all}
.modal{background:rgba(16,12,8,0.97);border:1px solid var(--glass-border);border-radius:20px;max-width:460px;width:90vw;padding:24px;max-height:85vh;overflow-y:auto;transform:scale(0.92);transition:transform 0.3s cubic-bezier(0.16,1,0.3,1)}
.modal-overlay.active .modal{transform:scale(1)}

.toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);background:rgba(16,12,8,0.95);border:1px solid var(--glass-border);backdrop-filter:blur(20px);color:var(--text);border-radius:12px;padding:12px 20px;font-size:0.82rem;z-index:9999;box-shadow:0 8px 30px rgba(0,0,0,0.4);display:none;max-width:90vw;text-align:center;line-height:1.4}
.toast.show{display:block;animation:fadeIn 0.3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

#map{width:100%;height:400px;border-radius:var(--radius);overflow:hidden;border:1px solid var(--glass-border);margin-bottom:12px}
.leaflet-container{background:#0a0806!important}
.leaflet-control-zoom a{background:rgba(16,12,8,0.9)!important;color:var(--text)!important;border-color:var(--glass-border)!important}
.leaflet-popup-content-wrapper{background:rgba(16,12,8,0.96)!important;color:var(--text)!important;border:1px solid var(--glass-border)!important;border-radius:12px!important}
.leaflet-popup-tip{background:rgba(16,12,8,0.96)!important;border:1px solid var(--glass-border)!important}
.leaflet-popup-content{margin:10px 14px!important;font-size:0.8rem!important;font-family:'Inter',sans-serif!important}

.location-dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:4px}
.dot-green{background:#4caf50;box-shadow:0 0 6px rgba(76,175,80,0.5)}
.dot-yellow{background:#ffc107;box-shadow:0 0 6px rgba(255,193,7,0.5)}
.dot-red{background:#ff6b6b;box-shadow:0 0 6px rgba(255,107,107,0.5)}
.dot-purple{background:#ab47bc;box-shadow:0 0 6px rgba(171,71,188,0.5)}
.dot-orange{background:#ffa726;box-shadow:0 0 6px rgba(255,167,38,0.5)}

.gps-bar{display:flex;align-items:center;gap:8px;padding:8px 12px;background:rgba(76,175,80,0.08);border:1px solid rgba(76,175,80,0.2);border-radius:10px;font-size:0.68rem;color:var(--green);margin-bottom:12px}
.gps-bar.off{background:rgba(255,107,107,0.08);border-color:rgba(255,107,107,0.2);color:#ff6b6b}
.gps-bar .pulse{width:8px;height:8px;border-radius:50%;background:#4caf50;animation:pulse 1.5s infinite}
.gps-bar.off .pulse{background:#666;animation:none}
@keyframes pulse{0%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(1.3)}100%{opacity:1;transform:scale(1)}}

.coords-text{font-family:monospace;font-size:0.65rem;color:var(--text-dim)}
.role-badge{font-size:0.55rem;padding:2px 8px;border-radius:100px;font-weight:600}
.role-seller{background:rgba(212,165,116,0.15);color:var(--gold)}
.role-customer{background:rgba(66,165,245,0.15);color:var(--blue)}
.role-delivery{background:rgba(171,71,188,0.15);color:var(--purple)}

.dist-badge{font-size:0.6rem;color:var(--text-dim);background:var(--glass);padding:2px 8px;border-radius:100px}

.legend-row{display:flex;align-items:center;gap:8px;font-size:0.7rem;color:var(--text-dim);margin-bottom:4px}
.legend-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.legend-dot.nonvoy{background:var(--gold)}
.legend-dot.xaridor{background:var(--blue)}
.legend-dot.yetkazish{background:var(--purple)}
.legend-dot.siz{background:var(--green)}
</style>
</head>
<body>

<div class="nav">
  <div class="nav-logo">ZIYOKOR <span>NONLARI</span></div>
  <div class="nav-info">
    <span id="statusDot" style="width:6px;height:6px;border-radius:50%;background:#666"></span>
    <span id="peerStatus">connecting...</span>
  </div>
</div>

<div class="tab-bar" id="tabBar"></div>

<div class="content" id="app"></div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalContent"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================
// ZIYOKOR NONLARI — GPS P2P Marketplace
// Real-time location tracking for seller, customer, delivery
// No fake data. Only real Gun.js peer-to-peer state.
// ============================================================

const GUN_RELAY = window.location.origin + '/gun';

// ====== GUN ======
const gun = Gun({ peers: [GUN_RELAY], localStorage: true, radisk: true });

// ====== STATE ======
let peerCount = 0;
let myNodeId = 'user_' + Date.now().toString(36) + Math.random().toString(36).slice(2,5);
let myRole = null;
let myName = '';
let myBakeryName = '';
let myPhone = '';
let myProducts = [];
let currentTab = 0;
let cart = {};
let selectedBakeryId = null;
let myLat = null;
let myLng = null;
let gpsWatchId = null;
let gpsActive = false;

// Live P2P data stores
let bakeries = {};
let orders = {};
let myOrders = {};
let liveLocations = {}; // peerId -> { lat, lng, role, name, updatedAt }

// Map instance
let mapInstance = null;
let mapMarkers = {};
let deliveryLines = {};

// ====== PEER TRACKING ======
gun.on('hi', peer => {
  peerCount = Object.keys(Gun.peers || {}).length + 1;
  updatePeerUI();
});
gun.on('bye', peer => {
  peerCount = Object.keys(Gun.peers || {}).length;
  updatePeerUI();
});

function updatePeerUI() {
  const dot = document.getElementById('statusDot');
  const status = document.getElementById('peerStatus');
  const online = peerCount > 0;
  dot.style.background = online ? '#4caf50' : '#666';
  if (online) dot.style.boxShadow = '0 0 6px rgba(76,175,80,0.5)';
  else dot.style.boxShadow = 'none';
  status.textContent = online ? `${peerCount} peer(s) online` : 'offline';
  if (!online) status.style.color = 'var(--text-dim)';
  else status.style.color = '#4caf50';
}

// ====== GPS ENGINE ======
function startGps() {
  if (!navigator.geolocation) {
    showToast('⚠️ Brauzer GPS ni qo\'llab-quvvatlamaydi');
    return;
  }
  if (gpsWatchId !== null) return;
  gpsWatchId = navigator.geolocation.watchPosition(pos => {
    myLat = pos.coords.latitude;
    myLng = pos.coords.longitude;
    gpsActive = true;
    // Publish location to P2P graph
    gun.get('locations').get(myNodeId).put({
      lat: myLat,
      lng: myLng,
      role: myRole,
      name: myName,
      bakery: myBakeryName,
      online: true,
      updatedAt: Date.now()
    });
    // Also update bakery location if seller
    if (myRole === 'seller') {
      gun.get('bakeries').get(myNodeId).get('location').put({ lat: myLat, lng: myLng });
    }
    renderGpsBar();
  }, err => {
    console.warn('GPS error:', err.message);
    gpsActive = false;
    renderGpsBar();
  }, {
    enableHighAccuracy: true,
    timeout: 5000,
    maximumAge: 3000
  });
}

function stopGps() {
  if (gpsWatchId !== null) {
    navigator.geolocation.clearWatch(gpsWatchId);
    gpsWatchId = null;
  }
  gpsActive = false;
  // Mark offline in P2P
  gun.get('locations').get(myNodeId).put({ online: false, updatedAt: Date.now() });
  renderGpsBar();
}

function renderGpsBar() {
  const bar = document.getElementById('gpsBar');
  if (!bar || !myRole) return;
  const el = bar;
  if (gpsActive && myLat && myLng) {
    el.className = 'gps-bar';
    el.innerHTML = `<span class="pulse"></span><span>📡 GPS: ${myLat.toFixed(5)}, ${myLng.toFixed(5)}</span><span style="margin-left:auto;font-size:0.6rem">${myLat.toFixed(2)}°N, ${myLng.toFixed(2)}°E</span>`;
  } else {
    el.className = 'gps-bar off';
    el.innerHTML = `<span class="pulse"></span><span>📍 GPS: ${gpsWatchId !== null ? 'kutilyapti...' : 'faol emas'}</span><button class="btn btn-sm btn-ghost" style="margin-left:auto;padding:2px 10px;font-size:0.6rem" onclick="startGps()">Yoqish</button>`;
  }
}

// ====== LIVE LOCATIONS SUBSCRIPTION ======
function subscribeLocations() {
  gun.get('locations').map().on((loc, id) => {
    if (loc && loc.lat && loc.lng) {
      liveLocations[id] = { ...loc, id };
    }
  });
}

// ====== LOGIN ======
function showLogin() {
  const html = `
    <div style="max-width:420px;margin:40px auto;text-align:center">
      <h1 style="font-size:1.6rem;font-weight:800;color:var(--text-bright);margin-bottom:4px">ZIYOKOR <span style="color:var(--gold)">NONLARI</span></h1>
      <p style="color:var(--text-dim);font-size:0.8rem;margin-bottom:20px">P2P · GPS · Real-time · Decentralized</p>
      <div class="card" style="text-align:left">
        <div style="margin-bottom:12px">
          <label>Rol</label>
          <select id="loginRole">
            <option value="seller">🏪 Nonvoy (sotuvchi)</option>
            <option value="customer">🛒 Xaridor</option>
            <option value="delivery">🚚 Yetkazib beruvchi</option>
          </select>
        </div>
        <div style="margin-bottom:12px">
          <label>Ismingiz *</label>
          <input id="loginName" placeholder="Ismingiz" required>
        </div>
        <div style="margin-bottom:12px">
          <label>Telefon *</label>
          <input id="loginPhone" placeholder="+998 XX XXX XX XX" required>
        </div>
        <div style="margin-bottom:16px" id="bakeryField">
          <label>Nonvoyxona nomi *</label>
          <input id="loginBakery" placeholder="Nonvoyxona nomi">
        </div>
        <div style="margin-bottom:16px;display:none" id="vehicleField">
          <label>Transport turi</label>
          <select id="loginVehicle">
            <option value="velo">🚲 Velosiped</option>
            <option value="moto">🏍 Mototsikl</option>
            <option value="car">🚗 Mashina</option>
            <option value="foot">🚶 Piyoda</option>
          </select>
        </div>
        <button class="btn btn-primary" style="width:100%;justify-content:center" onclick="login()">Tarmoqqa ulanish →</button>
        <p style="color:var(--text-dim);font-size:0.6rem;margin-top:10px;text-align:center">📍 GPS joylashuvni ulashish talab qilinadi</p>
      </div>
    </div>
  `;
  document.getElementById('app').innerHTML = html;

  document.getElementById('loginRole').addEventListener('change', e => {
    document.getElementById('bakeryField').style.display = e.target.value === 'seller' ? 'block' : 'none';
    document.getElementById('vehicleField').style.display = e.target.value === 'delivery' ? 'block' : 'none';
  });
  document.getElementById('bakeryField').style.display = 'block';
}

function login() {
  const role = document.getElementById('loginRole').value;
  const name = document.getElementById('loginName').value.trim();
  const phone = document.getElementById('loginPhone').value.trim();
  const bakeryName = document.getElementById('loginBakery')?.value?.trim() || '';
  const vehicle = document.getElementById('loginVehicle')?.value || 'velo';

  if (!name || !phone) { showToast('⚠️ Ism va telefon majburiy'); return; }
  if (role === 'seller' && !bakeryName) { showToast('⚠️ Nonvoyxona nomini kiriting'); return; }

  myRole = role;
  myName = name;
  myPhone = phone;
  myBakeryName = bakeryName;

  // Subscribe to locations
  subscribeLocations();

  // Initialize based on role
  if (role === 'seller') initSeller();
  else if (role === 'customer') initCustomer();
  else initDelivery(vehicle);

  // Start GPS tracking
  startGps();

  initTabs();
  render();
}

// ====== SELLER ======
function initSeller() {
  const nodeId = myNodeId;

  gun.get('bakeries').get(nodeId).put({
    id: nodeId,
    name: myBakeryName,
    owner: myName,
    phone: myPhone,
    status: 'open',
    joinedAt: Date.now(),
    online: true,
    role: 'seller'
  });

  // Listen for orders
  gun.get('orders').map().on((order, orderId) => {
    if (order && order.bakeryId === nodeId) {
      orders[orderId] = { ...order, id: orderId };
      myOrders[orderId] = { ...order, id: orderId };
      render();
      if (order.status === 'pending') showToast(`🆕 #${orderId.slice(-5)} yangi buyurtma`);
    }
  });

  showToast(`🏪 ${myBakeryName} P2P tarmoqqa qo'shildi`);
}

// ====== CUSTOMER ======
function initCustomer() {
  gun.get('bakeries').map().on((bakery, id) => {
    if (bakery && bakery.name) {
      bakeries[id] = { ...bakery, id };
      gun.get('bakeries').get(id).get('location').once(loc => {
        if (loc) bakeries[id].location = loc;
        render();
      });
      render();
    }
  });

  gun.get('orders').map().on((order, orderId) => {
    if (order && order.customerId === myNodeId) {
      orders[orderId] = { ...order, id: orderId };
      myOrders[orderId] = { ...order, id: orderId };
      render();
    }
  });
}

// ====== DELIVERY ======
let myVehicle = 'velo';
function initDelivery(vehicle) {
  myVehicle = vehicle || 'velo';

  // Publish delivery person info
  gun.get('delivery').get(myNodeId).put({
    id: myNodeId,
    name: myName,
    phone: myPhone,
    vehicle: myVehicle,
    online: true,
    busy: false
  });

  // Listen for all orders (to claim ready ones)
  gun.get('orders').map().on((order, orderId) => {
    if (order) {
      // Store orders that need delivery (ready status) or assigned to me
      if (order.deliveryId === myNodeId || order.status === 'ready' || order.status === 'delivering') {
        myOrders[orderId] = { ...order, id: orderId };
        orders[orderId] = { ...order, id: orderId };
        render();
      }
    }
  });

  showToast(`🚚 ${myName} yetkazish tarmog'iga qo'shildi`);
}

// ====== PRODUCTS ======
function addProduct() {
  const name = prompt('Non nomi:');
  if (!name) return;
  const price = parseInt(prompt('Narxi (so\'m):'));
  if (isNaN(price) || price < 500) { showToast('⚠️ Narx noto\'g\'ri'); return; }

  myProducts.push({ id: Date.now(), name, price, desc: '' });
  gun.get('bakeries').get(myNodeId).get('products').put(myProducts);
  render();
  showToast(`✅ ${name} qo'shildi`);
}

function removeProduct(id) {
  myProducts = myProducts.filter(p => p.id !== id);
  gun.get('bakeries').get(myNodeId).get('products').put(myProducts);
  render();
}

// ====== TABS ======
function initTabs() {
  let tabs = [];
  if (myRole === 'seller') tabs = ['📊 Dashboard', '🍞 Nonlarim', '📦 Buyurtmalar', '🗺 Xarita', '⚙️'];
  else if (myRole === 'customer') tabs = ['🍞 Nonlar', '📍 Nonvoyxona', '📦 Buyurtmalar', '🗺 Xarita', '⚙️'];
  else tabs = ['📦 Buyurtmalar', '🗺 Xarita', '📍 Mening joyim', '⚙️'];

  const bar = document.getElementById('tabBar');
  bar.innerHTML = tabs.map((t,i) =>
    `<button class="tab-btn ${i===0?'active':''}" onclick="switchTab(${i})">${t}</button>`
  ).join('');
}

function switchTab(idx) {
  currentTab = idx;
  document.querySelectorAll('.tab-btn').forEach((t,i) => t.classList.toggle('active', i === idx));
  render();
}

// ====== RENDER ======
function render() {
  if (!myRole) return showLogin();
  const app = document.getElementById('app');

  if (myRole === 'seller') {
    if (currentTab === 0) app.innerHTML = sellerDashboard();
    else if (currentTab === 1) app.innerHTML = sellerProducts();
    else if (currentTab === 2) app.innerHTML = sellerOrders();
    else if (currentTab === 3) app.innerHTML = mapView('seller');
    else if (currentTab === 4) app.innerHTML = settingsView();
  } else if (myRole === 'customer') {
    if (currentTab === 0) app.innerHTML = customerProducts();
    else if (currentTab === 1) app.innerHTML = customerBakeries();
    else if (currentTab === 2) app.innerHTML = customerOrders();
    else if (currentTab === 3) app.innerHTML = mapView('customer');
    else if (currentTab === 4) app.innerHTML = settingsView();
  } else {
    if (currentTab === 0) app.innerHTML = deliveryOrders();
    else if (currentTab === 1) app.innerHTML = mapView('delivery');
    else if (currentTab === 2) app.innerHTML = deliveryMyLocation();
    else if (currentTab === 3) app.innerHTML = settingsView();
  }

  // Ensure GPS bar exists
  if (!document.getElementById('gpsBar') && myRole) {
    const firstCard = app.querySelector('.card, .empty-state');
    if (firstCard) {
      const bar = document.createElement('div');
      bar.id = 'gpsBar';
      bar.className = 'gps-bar off';
      bar.innerHTML = `<span class="pulse"></span><span>📍 GPS faol emas</span>`;
      firstCard.parentNode.insertBefore(bar, firstCard);
      renderGpsBar();
    }
  }
}

function orderCard(o, showActions) {
  const customerLoc = liveLocations[o.customerId];
  const deliveryLoc = liveLocations[o.deliveryId];
  let locHtml = '';
  if (o.customerLat && o.customerLng) {
    locHtml += `<span class="dist-badge">🛒 ${o.customerLat.toFixed(4)}, ${o.customerLng.toFixed(4)}</span> `;
  }
  if (deliveryLoc) {
    locHtml += `<span class="dist-badge">🚚 ${deliveryLoc.lat?.toFixed(4)}, ${deliveryLoc.lng?.toFixed(4)}</span>`;
  }

  const actionsHtml = {
    pending: `<button class="btn btn-success btn-sm" onclick="updateOrder('${o.id}','accepted')">✅ Qabul qilish</button>
              <button class="btn btn-danger btn-sm" onclick="updateOrder('${o.id}','rejected')">❌ Rad etish</button>`,
    accepted: `<button class="btn btn-primary btn-sm" onclick="updateOrder('${o.id}','baking')">🔥 Tayyorlanmoqda</button>`,
    baking: `<button class="btn btn-primary btn-sm" onclick="updateOrder('${o.id}','ready')">✅ Tayyor</button>`,
    ready: `<span style="font-size:0.7rem;color:var(--gold)">✅ Tayyor · Yetkazuvchi kutilmoqda</span>`,
    delivering: `<span style="font-size:0.7rem;color:var(--orange)">🚚 Yetkazilmoqda</span>`,
    delivered: `<span style="font-size:0.7rem;color:var(--green)">✅ Yetkazildi</span>`,
    rejected: `<span style="font-size:0.7rem;color:#ff6b6b">❌ Bekor qilindi</span>`,
  };

  const items = (o.items || []).map(i => `${i.name || i.productName} x${i.qty || i.quantity}`).join(', ');
  const deliveryName = o.deliveryName ? ` · 🚚 ${o.deliveryName}` : '';
  return `<div class="card" style="margin-bottom:10px;border-left:3px solid ${o.status==='pending'?'var(--gold)':o.status==='delivering'?'var(--orange)':o.status==='delivered'?'var(--green)':'var(--glass-border)'}">
    <div style="display:flex;justify-content:space-between;margin-bottom:4px">
      <span style="font-size:0.65rem;color:var(--text-dim)">#${o.id.slice(-5)} · ${o.customerName || 'Xaridor'}</span>
      <span class="status-badge status-${o.status}">${o.status}</span>
    </div>
    <div style="font-size:0.8rem;color:var(--text);margin-bottom:4px">${items || '—'}</div>
    <div style="font-size:0.78rem;font-weight:600;color:var(--gold);margin-bottom:4px">${(o.total||0).toLocaleString()} so'm</div>
    <div style="font-size:0.65rem;color:var(--text-dim);margin-bottom:4px">📍 ${o.address || 'Manzil kiritilmagan'} · 📞 ${o.customerPhone || '—'}${deliveryName}</div>
    <div style="font-size:0.65rem;color:var(--text-dim);margin-bottom:6px">${locHtml}</div>
    ${showActions && actionsHtml[o.status] ? `<div style="display:flex;gap:6px;flex-wrap:wrap">${actionsHtml[o.status]}</div>` : ''}
  </div>`;
}

function updateOrder(orderId, status) {
  const order = orders[orderId] || myOrders[orderId];
  if (!order) return;
  order.status = status;

  gun.get('orders').get(orderId).get('status').put(status);

  render();
  const msgs = {
    accepted: '✅ Buyurtma qabul qilindi',
    rejected: '❌ Buyurtma rad etildi',
    baking: '🟠 Tayyorlanmoqda',
    ready: '✅ Tayyor',
  };
  showToast(msgs[status] || status);
}

// ====== CART ======
function addToCart(bakeryId, bakeryName, productId, productName, price) {
  if (!bakeryId) { showToast('⚠️ Nonvoy tanlanmagan'); return; }
  selectedBakeryId = bakeryId;
  const key = productId;
  if (cart[key]) cart[key].qty++;
  else cart[key] = { id: productId, name: productName, price, qty: 1, bakeryId, bakeryName };
  updateCartFab();
  showToast(`✅ ${productName} savatga qo'shildi`);
}

function updateCartFab() {
  const count = Object.values(cart).reduce((s,i) => s + i.qty, 0);
  const existing = document.getElementById('cartFab');
  if (existing) existing.querySelector('.badge').textContent = count;
}

function showCart() {
  const items = Object.values(cart);
  if (!items.length) { showToast('⚠️ Savat bo\'sh'); return; }
  const total = items.reduce((s,i) => s + i.price * i.qty, 0);
  const bakeryName = items[0]?.bakeryName || 'Nonvoy';

  const modal = document.getElementById('modalContent');
  modal.innerHTML = `
    <button class="btn btn-ghost btn-sm" style="float:right" onclick="closeModal()">✕</button>
    <h2 style="font-size:1.1rem;color:var(--text-bright);margin-bottom:14px">🛒 Savat · ${bakeryName}</h2>
    ${items.map(i => `
      <div style="display:flex;justify-content:space-between;align-items:center;font-size:0.82rem;color:var(--text);padding:6px 0;border-bottom:1px solid var(--glass-border)">
        <span>${i.name} x${i.qty}</span>
        <span style="color:var(--gold);font-weight:600">${(i.price * i.qty).toLocaleString()} so'm</span>
      </div>
    `).join('')}
    <div style="display:flex;justify-content:space-between;font-size:0.9rem;font-weight:700;color:var(--gold);padding:10px 0;margin-top:4px">
      <span>Jami</span><span>${total.toLocaleString()} so'm</span>
    </div>
    <label style="margin-top:12px">Yetkazib berish manzili</label>
    <textarea id="orderAddress" rows="2" style="margin-top:4px;min-height:50px" placeholder="Manzilni kiriting"></textarea>
    <p style="font-size:0.6rem;color:var(--text-dim);margin-top:6px">📍 Sizning joylashuvingiz avtomatik yuboriladi</p>
    <button class="btn btn-primary" style="width:100%;justify-content:center;margin-top:14px" onclick="placeOrder()">📡 Buyurtmani P2P yuborish</button>
  `;
  document.getElementById('modalOverlay').classList.add('active');
}

function placeOrder() {
  const address = document.getElementById('orderAddress').value.trim();
  if (!address) { showToast('⚠️ Manzilni kiriting'); return; }

  const items = Object.values(cart);
  const total = items.reduce((s,i) => s + i.price * i.qty, 0);
  const orderId = 'ord_' + Date.now().toString(36) + Math.random().toString(36).slice(2,5);

  const order = {
    id: orderId,
    bakeryId: selectedBakeryId || items[0]?.bakeryId || 'unknown',
    bakeryName: items[0]?.bakeryName || 'Nonvoy',
    customerId: myNodeId,
    customerName: myName,
    customerPhone: myPhone,
    customerLat: myLat,
    customerLng: myLng,
    items: items.map(i => ({ productId: i.id, name: i.name, qty: i.qty, price: i.price })),
    total,
    address,
    status: 'pending',
    createdAt: Date.now(),
  };

  // ---- SHOW CONFIRMATION INSIDE CART MODAL ----
  const modal = document.getElementById('modalContent');
  modal.innerHTML = `
    <h2 style="font-size:1.1rem;color:var(--text-bright);margin-bottom:14px">✅ Buyurtmani tasdiqlang</h2>
    <div style="font-size:0.8rem;color:var(--text-dim);margin-bottom:12px">
      <div style="margin-bottom:8px">
        <span style="color:var(--text-bright)">🏪 ${order.bakeryName}</span>
      </div>
      ${items.map(i => `
        <div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--glass-border)">
          <span>${i.name} x${i.qty}</span>
          <span style="color:var(--gold)">${(i.price * i.qty).toLocaleString()} so'm</span>
        </div>
      `).join('')}
      <div style="display:flex;justify-content:space-between;font-weight:700;color:var(--gold);padding:8px 0">
        <span>Jami</span><span>${total.toLocaleString()} so'm</span>
      </div>
      <div style="font-size:0.72rem;margin-top:8px">
        <div>📍 Yetkazish: ${address}</div>
        <div>📞 ${myPhone}</div>
        ${myLat && myLng ? `<div>📍 GPS: ${myLat.toFixed(5)}, ${myLng.toFixed(5)}</div>` : ''}
      </div>
    </div>
    <div style="display:flex;gap:10px">
      <button class="btn btn-ghost" style="flex:1;justify-content:center" onclick="showCart()">❌ Bekor qilish</button>
      <button class="btn btn-success" style="flex:1;justify-content:center" onclick="confirmOrder()">✅ Tasdiqlash</button>
    </div>
  `;

  window._pendingOrder = order;
  window._pendingItems = items;
  window._pendingOrderId = orderId;
}

function confirmOrder() {
  const order = window._pendingOrder;
  const orderId = window._pendingOrderId;
  if (!order) return;

  gun.get('orders').get(orderId).put(order);

  if (order.bakeryId) {
    gun.get('bakeries').get(order.bakeryId).get('orders').get(orderId).put(order);
  }

  myOrders[orderId] = { ...order, id: orderId };
  orders[orderId] = { ...order, id: orderId };

  cart = {};
  selectedBakeryId = null;
  updateCartFab();
  document.getElementById('cartFab')?.remove();

  if (myRole === 'seller') {
    orders[orderId] = { ...order, id: orderId };
    myOrders[orderId] = { ...order, id: orderId };
  }

  // Show success in same modal
  const modal = document.getElementById('modalContent');
  modal.innerHTML = `
    <div style="text-align:center;padding:20px 0">
      <div style="font-size:3rem;margin-bottom:12px">✅</div>
      <h2 style="font-size:1.2rem;color:var(--text-bright);margin-bottom:6px">Buyurtma yuborildi!</h2>
      <p style="font-size:0.8rem;color:var(--text-dim);margin-bottom:4px">#${orderId.slice(-8)}</p>
      <p style="font-size:0.7rem;color:var(--green);margin-bottom:20px">📍 ${order.address}</p>
      <div style="display:flex;gap:10px;flex-direction:column">
        <button class="btn btn-primary" style="justify-content:center" onclick="closeModal(); switchTab(2); render()">📦 Buyurtmalarim</button>
        <button class="btn btn-ghost" style="justify-content:center" onclick="closeModal()">⬅ Davom etish</button>
      </div>
    </div>
  `;

  window._pendingOrder = null;
  window._pendingItems = null;
  window._pendingOrderId = null;
}

      <div style="margin-bottom:12px">
        <div style="font-size:0.82rem;color:var(--text-bright);margin-bottom:8px">🟢 Tayyor buyurtmalar (olish mumkin)</div>
        ${available.map(o => `
          <div class="card" style="margin-bottom:8px;border-color:var(--green)">
            <div style="display:flex;justify-content:space-between;margin-bottom:4px">
              <span style="font-size:0.65rem;color:var(--text-dim)">#${o.id.slice(-5)} · ${o.bakeryName} → ${o.customerName}</span>

let mapInitialized = false;
function initMap(role) {
  if (mapInstance) {
    mapInstance.invalidateSize();
    updateMapMarkers(role);
    return;
  }
  const container = document.getElementById('map');
  if (!container) return;
  if (container._leaflet_id) return;

  const defaultPos = myLat && myLng ? [myLat, myLng] : [41.2995, 69.2401]; // Tashkent default
  mapInstance = L.map('map', {
    center: defaultPos,
    zoom: 13,
    zoomControl: true,
    attributionControl: false,
  });

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    className: 'map-tiles'
  }).addTo(mapInstance);

  updateMapMarkers(role);
}

function updateMapMarkers(role) {
  if (!mapInstance) return;

  // Remove old markers not in current locations
  const activeIds = new Set(Object.keys(liveLocations));
  activeIds.add(myNodeId);
  Object.keys(mapMarkers).forEach(id => {
    if (!activeIds.has(id)) {
      mapInstance.removeLayer(mapMarkers[id]);
      delete mapMarkers[id];
    }
  });

  // My location marker (always shown)
  if (myLat && myLng) {
    updateMarker(myNodeId, myLat, myLng, 'me', myName, myRole);
  }

  // All live locations
  Object.values(liveLocations).forEach(loc => {
    if (loc.id === myNodeId) return;
    if (!loc.online) return;
    updateMarker(loc.id, loc.lat, loc.lng, loc.role, loc.name, loc.role);
  });

  // Add delivery route lines if customer tracking delivery
  if (role === 'customer') {
    Object.values(myOrders).forEach(o => {
      if ((o.status === 'delivering' || o.status === 'ready') && o.deliveryId && liveLocations[o.deliveryId]) {
        const delLoc = liveLocations[o.deliveryId];
        const customerLoc = o.customerLat && o.customerLng ? [o.customerLat, o.customerLng] : null;
        const bakeryLoc = bakeries[o.bakeryId]?.location;

        // Remove existing line for this order
        if (deliveryLines[o.id]) {
          mapInstance.removeLayer(deliveryLines[o.id]);
        }

        const points = [];
        if (bakeryLoc) points.push([bakeryLoc.lat, bakeryLoc.lng]);
        if (delLoc.lat && delLoc.lng) points.push([delLoc.lat, delLoc.lng]);
        if (customerLoc) points.push(customerLoc);

        if (points.length >= 2) {
          deliveryLines[o.id] = L.polyline(points, {
            color: '#ffa726',
            weight: 3,
            opacity: 0.7,
            dashArray: '8, 8'
          }).addTo(mapInstance);
        }
      }
    });
  }

  // Order location markers
  Object.values(orders).forEach(o => {
    // Bakery location marker for the order
    const bakeryLoc = bakeries[o.bakeryId]?.location;
    if (bakeryLoc && o.status !== 'delivered') {
      const key = 'order_bakery_' + o.id;
      if (!mapMarkers[key]) {
        const icon = L.divIcon({
          html: '<div style="background:var(--gold);width:14px;height:14px;border-radius:50%;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,0.4)"></div>',
          iconSize: [14, 14],
          iconAnchor: [7, 7],
          className: ''
        });
        mapMarkers[key] = L.marker([bakeryLoc.lat, bakeryLoc.lng], { icon })
          .bindPopup(`<b>🏪 ${o.bakeryName}</b><br>#${o.id.slice(-5)}`)
          .addTo(mapInstance);
      }
    }
    // Customer location marker
    if (o.customerLat && o.customerLng && o.status !== 'delivered') {
      const key = 'order_customer_' + o.id;
      if (!mapMarkers[key]) {
        const icon = L.divIcon({
          html: '<div style="background:var(--blue);width:12px;height:12px;border-radius:50%;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,0.4)"></div>',
          iconSize: [12, 12],
          iconAnchor: [6, 6],
          className: ''
        });
        mapMarkers[key] = L.marker([o.customerLat, o.customerLng], { icon })
          .bindPopup(`<b>🛒 ${o.customerName}</b><br>${o.address || ''}`)
          .addTo(mapInstance);
      }
    }
  });

  // Update peers count
  const peerEl = document.getElementById('mapPeers');
  if (peerEl) {
    const roles = { seller: 0, customer: 0, delivery: 0 };
    Object.values(liveLocations).forEach(l => { if (l.online && l.role) roles[l.role]++; });
    peerEl.innerHTML = `🏪 ${roles.seller} · 🛒 ${roles.customer} · 🚚 ${roles.delivery} · 📡 ${Object.keys(mapMarkers).length} marker`;
  }
}

function updateMarker(id, lat, lng, role, name, actualRole) {
  const isMe = id === myNodeId;
  const colors = { seller: '#d4a574', customer: '#42a5f5', delivery: '#ab47bc', me: '#4caf50' };
  const icons = { seller: '🏪', customer: '🛒', delivery: '🚚', me: '📍' };
  const c = isMe ? colors.me : (colors[role] || '#666');
  const iconLabel = isMe ? icons.me : (icons[role] || '📍');
  const label = isMe ? `${myName} (siz)` : `${name || 'Foydalanuvchi'} ${role === 'delivery' ? '🚚' : role === 'seller' ? '🏪' : '🛒'}`;

  const icon = L.divIcon({
    html: `<div style="background:${c};width:${isMe ? 18 : 14}px;height:${isMe ? 18 : 14}px;border-radius:50%;border:3px solid rgba(255,255,255,0.8);box-shadow:0 2px 8px rgba(0,0,0,0.5);transition:all 0.3s"></div>`,
    iconSize: isMe ? [18, 18] : [14, 14],
    iconAnchor: isMe ? [9, 9] : [7, 7],
    className: ''
  });

  if (mapMarkers[id]) {
    mapMarkers[id].setLatLng([lat, lng]);
  } else {
    mapMarkers[id] = L.marker([lat, lng], { icon })
      .bindPopup(`<b>${iconLabel} ${label}</b>${isMe ? '<br><span style="color:#4caf50">📍 Siz</span>' : `<br><span style="color:${c}">${actualRole === 'delivery' ? '🚚 Yetkazib beruvchi' : actualRole === 'seller' ? '🏪 Nonvoy' : '🛒 Xaridor'}</span>`}`)
      .addTo(mapInstance);
  }
}

function centerMap() {
  if (!mapInstance || !myLat || !myLng) return;
  mapInstance.setView([myLat, myLng], 14);
}

// ====== UTILITIES ======
function calcDistance(lat1, lng1, lat2, lng2) {
  const R = 6371;
  const dLat = (lat2-lat1)*Math.PI/180;
  const dLng = (lng2-lng1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return (R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a))).toFixed(1);
}

function emptyState(icon, title, desc, hint) {
  return `<div class="empty-state">
    <span class="icon">${icon}</span>
    <p>${title}</p>
    <p class="hint">${desc}</p>
    ${hint ? `<p class="hint" style="margin-top:6px">${hint}</p>` : ''}
  </div>`;
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);

}
