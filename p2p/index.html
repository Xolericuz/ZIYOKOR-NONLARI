<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ZIYOKOR NONLARI — P2P Marketplace</title>
<script src="https://cdn.jsdelivr.net/npm/gun@0.9.999/gun.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gun@0.9.999/sea.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gun@0.9.999/lib/radix.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gun@0.9.999/lib/store.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gun@0.9.999/lib/rindexed.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --glass:rgba(255,255,255,0.05);
  --glass-border:rgba(255,255,255,0.08);
  --glass-hover:rgba(255,255,255,0.1);
  --text:#f0ece6;
  --text-dim:rgba(240,236,230,0.5);
  --text-bright:#fff;
  --gold:#d4a574;
  --gold-dim:rgba(212,165,116,0.3);
  --accent:#e86a3a;
  --green:#4caf50;
  --blue:#42a5f5;
  --bg:#0a0806;
  --card:rgba(255,255,255,0.04);
  --radius:16px;
  --transition:all 0.3s cubic-bezier(0.16,1,0.3,1);
}
html{scroll-behavior:smooth}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;line-height:1.5;min-height:100dvh;padding-bottom:80px}
.orb{position:fixed;border-radius:50%;pointer-events:none;z-index:0;filter:blur(120px)}
.orb-1{width:600px;height:600px;background:rgba(212,165,116,0.05);top:-150px;right:-150px;animation:orb1 25s ease-in-out infinite}
.orb-2{width:400px;height:400px;background:rgba(232,106,58,0.04);bottom:-100px;left:-100px;animation:orb2 30s ease-in-out infinite}
@keyframes orb1{0%,100%{transform:translate(0,0)}40%{transform:translate(-60px,80px)}70%{transform:translate(40px,-30px)}}
@keyframes orb2{0%,100%{transform:translate(0,0)}35%{transform:translate(80px,-60px)}65%{transform:translate(-30px,40px)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

.btn{padding:10px 22px;border-radius:100px;border:none;font-size:0.8rem;font-weight:600;cursor:pointer;transition:var(--transition);font-family:inherit;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:linear-gradient(135deg,#b8854a,var(--gold));color:#fff}
.btn-primary:hover{opacity:0.9;transform:translateY(-1px)}
.btn-ghost{background:var(--glass);border:1px solid var(--glass-border);color:var(--text-dim)}
.btn-ghost:hover{color:var(--text);border-color:var(--gold)}
.btn-success{background:var(--green);color:#fff}
.btn-danger{background:rgba(255,107,107,0.15);color:#ff6b6b;border:1px solid rgba(255,107,107,0.3)}
.btn-sm{padding:6px 14px;font-size:0.7rem}

.card{background:var(--card);border:1px solid var(--glass-border);border-radius:var(--radius);padding:16px;transition:var(--transition)}
.card:hover{border-color:rgba(212,165,116,0.15)}
input,select,textarea{background:var(--glass);border:1px solid var(--glass-border);border-radius:10px;color:var(--text);padding:10px 14px;font-size:0.85rem;outline:none;width:100%;font-family:inherit;transition:var(--transition)}
input:focus,select:focus,textarea:focus{border-color:var(--gold)}
input::placeholder,textarea::placeholder{color:var(--text-dim)}
select option{background:#0a0806}
label{font-size:0.75rem;color:var(--text-dim);margin-bottom:4px;display:block}

.peer-status{display:flex;align-items:center;gap:6px;font-size:0.65rem;color:var(--text-dim)}
.peer-dot{width:6px;height:6px;border-radius:50%;background:#666}
.peer-dot.online{background:var(--green);box-shadow:0 0 6px rgba(76,175,80,0.5)}
.peer-dot.offline{background:#666}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(16,12,8,0.95);border:1px solid var(--glass-border);backdrop-filter:blur(20px);color:var(--text);border-radius:100px;padding:10px 22px;font-size:0.78rem;z-index:999;box-shadow:0 8px 30px rgba(0,0,0,0.4);animation:fadeIn 0.3s ease;white-space:nowrap}

.nav{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:rgba(10,8,6,0.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--glass-border);position:sticky;top:0;z-index:100}
.nav-logo{font-size:0.95rem;font-weight:700;color:var(--text-bright);display:flex;align-items:center;gap:8px}
.nav-logo span{color:var(--gold)}

.tab-bar{display:flex;background:rgba(255,255,255,0.02);border-bottom:1px solid var(--glass-border);overflow-x:auto;position:sticky;top:48px;z-index:99}
.tab-bar::-webkit-scrollbar{display:none}
.tab-btn{padding:10px 18px;font-size:0.72rem;font-weight:500;color:var(--text-dim);background:none;border:none;cursor:pointer;white-space:nowrap;font-family:inherit;border-bottom:2px solid transparent;transition:var(--transition)}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold)}

.content{padding:16px;max-width:1100px;margin:0 auto;width:100%}
.section-title{font-size:1.2rem;font-weight:700;color:var(--text-bright);margin-bottom:4px}
.section-sub{color:var(--text-dim);font-size:0.78rem;margin-bottom:16px}

.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid-3{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}

.prod-img{width:100%;aspect-ratio:1;object-fit:cover;display:block;border-radius:8px;background:#100a04}
.prod-name{font-size:0.82rem;font-weight:600;color:var(--text-bright);margin-top:6px}
.prod-price{font-size:0.9rem;font-weight:700;color:var(--gold)}
.prod-price sub{font-size:0.55rem;color:var(--text-dim);font-weight:400}
.prod-desc{font-size:0.65rem;color:var(--text-dim);margin:3px 0 8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

.bakery-item{display:flex;align-items:center;gap:12px;padding:12px 14px;cursor:pointer}
.bakery-icon{width:44px;height:44px;border-radius:10px;background:linear-gradient(135deg,#1a1006,#2a1a0a);display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0}
.bakery-info{flex:1}
.bakery-name{font-size:0.85rem;font-weight:600;color:var(--text-bright)}
.bakery-detail{font-size:0.68rem;color:var(--text-dim);margin-top:2px}
.bakery-dist{font-size:0.68rem;color:var(--gold);font-weight:600;white-space:nowrap}

.order-item{animation:fadeIn 0.3s ease}
.status-badge{font-size:0.6rem;padding:3px 10px;border-radius:100px;font-weight:600}
.status-pending{background:rgba(255,193,7,0.15);color:#ffc107}
.status-accepted{background:rgba(66,165,245,0.15);color:var(--blue)}
.status-baking{background:rgba(212,165,116,0.15);color:var(--gold)}
.status-ready{background:rgba(76,175,80,0.15);color:var(--green)}
.status-delivering{background:rgba(76,175,80,0.2);color:#66bb6a}
.status-delivered{background:rgba(76,175,80,0.25);color:#81c784}

.modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.6);backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.3s}
.modal-overlay.active{opacity:1;pointer-events:all}
.modal{background:rgba(16,12,8,0.97);border:1px solid var(--glass-border);border-radius:20px;max-width:460px;width:90vw;padding:24px;max-height:85vh;overflow-y:auto;transform:scale(0.92);transition:transform 0.3s cubic-bezier(0.16,1,0.3,1)}
.modal-overlay.active .modal{transform:scale(1)}
.modal h2{font-size:1.1rem;color:var(--text-bright);margin-bottom:14px}

.fab{position:fixed;bottom:24px;right:16px;z-index:50;width:54px;height:54px;border-radius:50%;background:linear-gradient(135deg,#b8854a,var(--gold));color:#fff;border:none;font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px var(--gold-dim);transition:var(--transition)}
.fab:hover{transform:scale(1.08)}
.fab-badge{position:absolute;top:-4px;right:-4px;background:var(--accent);color:#fff;width:20px;height:20px;border-radius:50%;font-size:0.6rem;font-weight:700;display:flex;align-items:center;justify-content:center}

.online-count{font-size:0.65rem;color:var(--green);display:flex;align-items:center;gap:4px}

@media(max-width:600px){.grid-2{grid-template-columns:1fr}.nav{padding:8px 12px}}
</style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<!-- LOGIN -->
<div class="modal-overlay active" id="loginModal" style="z-index:999">
  <div class="modal" style="text-align:center">
    <h1 style="font-size:1.6rem;font-weight:800;color:var(--text-bright);margin-bottom:2px">ZIYOKOR <span style="color:var(--gold)">NONLARI</span></h1>
    <p style="color:var(--text-dim);font-size:0.8rem;margin-bottom:6px">P2P decentralized marketplace</p>
    <p style="color:var(--text-dim);font-size:0.65rem;margin-bottom:20px">⚡ Zero server · Peer-to-peer · Offline-first</p>
    <div style="margin-bottom:12px;text-align:left">
      <label>Rol tanlang</label>
      <select id="loginRole">
        <option value="seller">🏪 Nonvoy (sotuvchi)</option>
        <option value="customer">🛒 Xaridor</option>
      </select>
    </div>
    <div style="margin-bottom:12px;text-align:left">
      <label>Ismingiz</label>
      <input id="loginName" value="Xoleric" placeholder="Ismingiz">
    </div>
    <div style="margin-bottom:12px;text-align:left">
      <label>Nonvoyxona nomi (agar sotuvchi bo'lsangiz)</label>
      <input id="loginBakery" value="Raximjon Nonvoyxonasi" placeholder="Nonvoyxona nomi">
    </div>
    <div style="margin-bottom:20px;text-align:left">
      <label>Telefon</label>
      <input id="loginPhone" value="+998993921157" placeholder="Telefon">
    </div>
    <button class="btn btn-primary" style="width:100%;justify-content:center" onclick="login()">Tarmoqqa ulanish →</button>
    <p style="color:var(--text-dim);font-size:0.6rem;margin-top:14px">🌐 Peer-to-peer tarmoqqa ulanasiz. Ma'lumotlaringiz faqat qurilmangizda saqlanadi.</p>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">
  <nav>
    <div class="nav-logo"><span id="navRole">🏪</span> ZIYOKOR <span>NONLARI</span></div>
    <div style="display:flex;align-items:center;gap:10px">
      <div class="peer-status"><div class="peer-dot" id="peerDot"></div><span id="peerCount">0</span></div>
      <span style="font-size:0.72rem;color:var(--text-dim)" id="navName">User</span>
      <button class="btn btn-ghost btn-sm" onclick="logout()">Chiqish</button>
    </div>
  </nav>

  <div class="tab-bar" id="tabBar"></div>

  <div class="content" id="panelContent"></div>
</div>

<!-- TOAST -->
<div id="toast" style="display:none"></div>

<script>
// ============================================================
// ZIYOKOR NONLARI — P2P DECENTRALIZED MARKETPLACE
// ============================================================
// Architecture:
//   - Every device is a peer in the Gun.js network
//   - No central database — data lives on devices
//   - IndexedDB for local persistence
//   - WebSocket relay for peer discovery (optional)
//   - GPS-based bakery discovery (computed locally)
//   - Orders are sent P2P via Gun.js graph
// ============================================================

// RELAY PEER (optional — helps peers find each other)
const RELAY = 'https://ziyokor-p2p-relay.onrender.com/gun';
// Fallback local relay
const LOCAL_RELAY = 'http://localhost:8765/gun';

// ====== GUN.JS INIT ======
const gun = Gun({
  peers: [RELAY, LOCAL_RELAY],
  localStorage: true,
  radisk: true,
  store: Gun.RindexedDB(localStorage),
});

// ====== STATE ======
let state = {
  user: null,
  role: 'customer',
  peers: 0,
  myBakery: null,
  cart: {},
  orders: {},
  discoveredBakeries: {},
  myOrders: {},
  peerBakeries: {},
};

// ====== GUN GRAPH NODES ======
// Gun.js uses a graph database. We'll use these root nodes:
//   bakeries/<bakeryId>  — Each bakery's data
//   orders/<orderId>     — Each order

let currentUser = null;
let myBakeryNode = null;
let myOrdersNode = null;

// ====== GPS ======
function getGPS() {
  return new Promise(resolve => {
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(
        pos => resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude }),
        () => resolve({ lat: 40.9983, lng: 71.6726 }),
        { enableHighAccuracy: true, timeout: 8000 }
      );
    } else {
      resolve({ lat: 40.9983, lng: 71.6726 });
    }
  });
}

function calcDistance(lat1, lng1, lat2, lng2) {
  const R = 6371;
  const dLat = (lat2-lat1)*Math.PI/180;
  const dLng = (lng2-lng1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return (R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a))).toFixed(1);
}

// ====== LOGIN / LOGOUT ======
async function login() {
  const role = document.getElementById('loginRole').value;
  const name = document.getElementById('loginName').value || 'Foydalanuvchi';
  const bakeryName = document.getElementById('loginBakery').value || 'Nonvoyxona';
  const phone = document.getElementById('loginPhone').value || '+998993921157';

  state.role = role;
  state.user = { id: role + '_' + Date.now() + '_' + Math.random().toString(36).slice(2,6), name, phone, bakeryName };

  document.getElementById('loginModal').classList.remove('active');
  document.getElementById('app').style.display = 'block';
  document.getElementById('navName').textContent = name;
  document.getElementById('navRole').textContent = role === 'seller' ? '🏪' : '🛒';

  // Connect to P2P network
  initP2P();
}

function logout() {
  state.user = null;
  document.getElementById('app').style.display = 'none';
  document.getElementById('loginModal').classList.add('active');
}

// ====== P2P NETWORK INIT ======
function initP2P() {
  const user = state.user;

  // Track network peers
  gun.on('hi', peer => {
    state.peers++;
    updatePeerStatus();
  });
  gun.on('bye', peer => {
    state.peers = Math.max(0, state.peers - 1);
    updatePeerStatus();
  });

  // Periodically update peer count
  setInterval(updatePeerStatus, 3000);

  if (state.role === 'seller') {
    initSeller(user);
  } else {
    initCustomer(user);
  }

  initTabs();
  renderCurrentTab();
}

function updatePeerStatus() {
  const dot = document.getElementById('peerDot');
  const count = document.getElementById('peerCount');
  const online = state.peers > 0;
  dot.className = 'peer-dot ' + (online ? 'online' : 'offline');
  count.textContent = online ? `${state.peers} peer` : 'offline';
  count.style.color = online ? 'var(--green)' : 'var(--text-dim)';
}

// ====== SELLER: PUBLISH BAKERY TO P2P NETWORK ======
function initSeller(user) {
  const bakeryId = user.id;

  // Publish bakery data to Gun graph
  gun.get('bakeries').get(bakeryId).put({
    id: bakeryId,
    name: user.bakeryName,
    owner: user.name,
    phone: user.phone,
    status: 'open',
    rating: 4.9,
    createdAt: Date.now(),
  });

  // Publish GPS location
  getGPS().then(loc => {
    gun.get('bakeries').get(bakeryId).get('location').put(loc);
    // Update location every 30s
    setInterval(() => {
      getGPS().then(l => gun.get('bakeries').get(bakeryId).get('location').put(l));
    }, 30000);
  });

  // Publish products
  const products = getDefaultProducts();
  gun.get('bakeries').get(bakeryId).get('products').put(products);

  // Listen for incoming orders (P2P)
  gun.get('orders').map().on((order, orderId) => {
    if (order && order.bakeryId === bakeryId && order.status === 'pending') {
      // A new order arrived via P2P!
      addIncomingOrder(order, orderId);
    }
  });

  // My bakery's orders
  gun.get('bakeries').get(bakeryId).get('orders').map().on((order, orderId) => {
    if (order && order.bakeryId === bakeryId) {
      addIncomingOrder(order, orderId);
    }
  });

  // Subscribe to ALL bakeries (to know network size)
  gun.get('bakeries').map().on((bakery, id) => {
    if (bakery && id !== bakeryId) {
      state.discoveredBakeries[id] = { ...bakery, id };
    }
  });

  state.myBakery = { id: bakeryId, name: user.bakeryName };
  showToast(`🏪 ${user.bakeryName} P2P tarmoqqa qo'shildi!`);
}

// ====== CUSTOMER: DISCOVER BAKERIES VIA P2P ======
function initCustomer(user) {
  // Subscribe to all bakeries in the P2P network
  gun.get('bakeries').map().on((bakery, id) => {
    if (bakery && bakery.name) {
      // Also get location
      gun.get('bakeries').get(id).get('location').once(loc => {
        state.discoveredBakeries[id] = { ...bakery, id, location: loc || {} };
        renderCurrentTab();
      });
      state.discoveredBakeries[id] = { ...bakery, id };
      renderCurrentTab();
    }
  });

  // Listen for order status updates
  gun.get('orders').map().on((order, orderId) => {
    if (order && order.customerId === user.id) {
      state.myOrders[orderId] = { ...order, id: orderId };
      renderCurrentTab();
    }
  });

  showToast('🛒 Nonlarni kashf qilish uchun yaqin nonvoylarni qidiring');
}

// ====== DEFAULT PRODUCTS ======
function getDefaultProducts() {
  return [
    { id:1, name:'Oq non', price:5000, desc:'Klassik oq non' },
    { id:2, name:'Tandir noni', price:8000, desc:'An\'anaviy tandir noni' },
    { id:3, name:'Patir non', price:10000, desc:'Yog\'li patir' },
    { id:4, name:'Kulcha non', price:5000, desc:'Kichik kulcha' },
    { id:5, name:'Samarqand noni', price:20000, desc:'Samarqand usulida' },
    { id:6, name:'Buxoro noni', price:18000, desc:'Buxorocha maxsus' },
    { id:7, name:'Farg\'ona noni', price:8000, desc:'Farg\'ona noni' },
    { id:8, name:'Qora non', price:7000, desc:'Kepakli non' },
    { id:9, name:'Zog\'ora non', price:6000, desc:'Makkajo\'xori noni' },
    { id:10, name:'Yupqa non', price:5000, desc:'Yupqa non' },
    { id:11, name:'Qalin non', price:7000, desc:'Qalin non' },
    { id:12, name:'Go\'shtli non', price:25000, desc:'Go\'shtli non' },
    { id:13, name:'Pishloqli non', price:12000, desc:'Pishloqli non' },
    { id:14, name:'Asalli non', price:15000, desc:'Asal bilan' },
    { id:15, name:'Non to\'plami', price:30000, desc:'5 xil non to\'plami' },
  ];
}

// ====== INCOMING ORDERS (seller side) ======
let incomingOrders = {};

function addIncomingOrder(order, orderId) {
  incomingOrders[orderId] = { ...order, id: orderId };
  renderCurrentTab();
  showToast(`🆕 #${orderId.slice(-4)} yangi buyurtma keldi!`);
}

// ====== TABS ======
let currentTab = 0;

function initTabs() {
  const tabs = state.role === 'seller'
    ? ['📊 Dashboard', '🍞 Nonlarim', '📦 Buyurtmalar', '🌐 Peerlar']
    : ['🍞 Nonlar', '📍 Nonvoyxona', '📦 Buyurtmalar'];

  const bar = document.getElementById('tabBar');
  bar.innerHTML = tabs.map((t,i) =>
    `<button class="tab-btn ${i===0?'active':''}" onclick="switchTab(${i})">${t}</button>`
  ).join('');
}

function switchTab(idx) {
  currentTab = idx;
  document.querySelectorAll('.tab-btn').forEach((t,i) => t.classList.toggle('active', i === idx));
  renderCurrentTab();
}

function renderCurrentTab() {
  const panel = document.getElementById('panelContent');
  if (state.role === 'seller') {
    if (currentTab === 0) panel.innerHTML = renderSellerDashboard();
    else if (currentTab === 1) panel.innerHTML = renderSellerProducts();
    else if (currentTab === 2) panel.innerHTML = renderSellerOrders();
    else if (currentTab === 3) panel.innerHTML = renderPeers();
  } else {
    if (currentTab === 0) panel.innerHTML = renderCustomerProducts();
    else if (currentTab === 1) panel.innerHTML = renderCustomerBakeries();
    else if (currentTab === 2) panel.innerHTML = renderCustomerOrders();
  }
}

// ====== RENDER: SELLER DASHBOARD ======
function renderSellerDashboard() {
  const totalOrders = Object.keys(incomingOrders).length;
  const revenue = Object.values(incomingOrders).reduce((s,o) => s + (o.total || 0), 0);
  const activeOrders = Object.values(incomingOrders).filter(o => o.status !== 'delivered' && o.status !== 'rejected');

  return `
    <div class="section-title">📊 P2P Dashboard</div>
    <div class="section-sub">Ma'lumotlaringiz faqat qurilmangizda saqlanadi · Tarmoqdagi peerlar: ${state.peers}</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:10px;margin-bottom:16px">
      ${[
        {num:totalOrders, lbl:'Jami buyurtma'},
        {num:revenue.toLocaleString(), lbl:'Daromad (so\'m)'},
        {num:activeOrders.length, lbl:'Faol buyurtma'},
        {num:Object.keys(state.discoveredBakeries).length, lbl:'Topilgan nonvoy'},
      ].map(s => `<div class="card" style="text-align:center;padding:14px"><div style="font-size:1.3rem;font-weight:700;color:var(--gold)">${s.num}</div><div style="font-size:0.63rem;color:var(--text-dim);margin-top:2px">${s.lbl}</div></div>`).join('')}
    </div>
    <div style="font-size:0.82rem;color:var(--text-bright);margin-bottom:10px">🟢 Jonli buyurtmalar (${activeOrders.length})</div>

function renderLiveOrderCard(o) {
  const actions = {
    pending: `<button class="btn btn-success btn-sm" onclick="acceptOrder('${o.id}')">✅ Qabul qilish</button>
              <button class="btn btn-danger btn-sm" onclick="rejectOrder('${o.id}')">❌ Rad etish</button>`,
    accepted: `<button class="btn btn-primary btn-sm" onclick="updateOrderStatus('${o.id}','baking')">🔥 Tayyorlanmoqda</button>`,
    baking: `<button class="btn btn-primary btn-sm" onclick="updateOrderStatus('${o.id}','ready')">✅ Tayyor</button>`,
    ready: `<span style="font-size:0.7rem;color:var(--gold)">⏳ Xaridor kelishini kuting</span>`,
  };

  return `<div class="card order-item" style="margin-bottom:10px;border-color:${o.status==='pending'?'var(--gold)':'var(--glass-border)'}">
    <div style="display:flex;justify-content:space-between;margin-bottom:4px">
      <span style="font-size:0.65rem;color:var(--text-dim)">#${o.id.slice(-6)} · ${o.customerName || 'Xaridor'}</span>

    <div style="font-size:0.65rem;color:var(--text-dim);margin-bottom:8px">📍 ${o.address || 'Manzil kutilmoqda'}</div>

}

// SELLER ACTIONS
function acceptOrder(orderId) {
  const order = incomingOrders[orderId];
  if (!order) return;
  order.status = 'accepted';
  // Update in Gun graph (P2P)
  gun.get('orders').get(orderId).get('status').put('accepted');
  renderCurrentTab();
  showToast(`✅ Buyurtma qabul qilindi`);
}

function rejectOrder(orderId) {
  const order = incomingOrders[orderId];
  if (!order) return;
  order.status = 'rejected';
  gun.get('orders').get(orderId).get('status').put('rejected');
  renderCurrentTab();
  showToast(`❌ Buyurtma rad etildi`);
}

function updateOrderStatus(orderId, status) {
  const order = incomingOrders[orderId];
  if (!order) return;
  order.status = status;
  gun.get('orders').get(orderId).get('status').put(status);
  renderCurrentTab();
  const msgs = { baking:'🟠 Tayyorlanmoqda', ready:'✅ Tayyor' };
  showToast(msgs[status] || status);
}

// ====== CART ======
let cart = {};
let selectedBakery = null;

function addToCart(bakeryId, bakeryName, productId, productName, price) {
  selectedBakery = { id: bakeryId, name: bakeryName };
  const key = productId;
  if (cart[key]) cart[key].qty++;
  else cart[key] = { id: productId, name: productName, price, qty: 1 };
  showToast(`✅ ${productName} savatga qo'shildi`);
}

function showCartModal() {
  const items = Object.values(cart);
  if (!items.length) { showToast('⚠️ Savat bo\'sh'); return; }
  const total = items.reduce((s, i) => s + i.price * i.qty, 0);

  document.getElementById('modalContent').innerHTML = `
    <button class="btn btn-ghost btn-sm" style="float:right" onclick="closeModal()">✕</button>
    <h2>🛒 Savat</h2>
    ${items.map(i => `<div style="display:flex;justify-content:space-between;font-size:0.82rem;color:var(--text);padding:4px 0"><span>${i.name} x${i.qty}</span><span>${(i.price*i.qty).toLocaleString()} so'm</span></div>`).join('')}
    <div style="display:flex;justify-content:space-between;font-size:0.9rem;font-weight:600;color:var(--gold);border-top:1px solid var(--glass-border);padding:10px 0;margin-top:6px">
      <span>Jami</span><span>${total.toLocaleString()} so'm</span>
    </div>
    <label style="margin-top:12px">Yetkazib berish manzili</label>
    <textarea id="orderAddress" rows="2" style="margin-top:4px;min-height:50px">Namangan shahar</textarea>
    <button class="btn btn-primary" style="width:100%;justify-content:center;margin-top:14px" onclick="placeP2POrder()">📡 P2P Buyurtma berish</button>
  `;
  document.getElementById('modalOverlay').classList.add('active');
}

function placeP2POrder() {
  const address = document.getElementById('orderAddress').value || 'Namangan shahar';
  const items = Object.values(cart);
  const total = items.reduce((s, i) => s + i.price * i.qty, 0);
  const user = state.user;
  const orderId = 'ord_' + Date.now() + '_' + Math.random().toString(36).slice(2,6);

  const order = {
    id: orderId,
    bakeryId: selectedBakery?.id || 'unknown',
    bakeryName: selectedBakery?.name || 'Nonvoy',
    customerId: user.id,
    customerName: user.name,
    customerPhone: user.phone,
    items,
    total,
    address,
    status: 'pending',
    createdAt: Date.now(),
  };

  // Write order to Gun graph → P2P sync to seller
  gun.get('orders').get(orderId).put(order);

  // Also write to bakery's orders sub-graph
  if (selectedBakery?.id) {
    gun.get('bakeries').get(selectedBakery.id).get('orders').get(orderId).put(order);
  }

  // Store locally
  state.myOrders[orderId] = { ...order, id: orderId };

  // Clear cart
  cart = {};
  selectedBakery = null;
  closeModal();

  showToast(`📡 #${orderId.slice(-6)} buyurtma P2P yuborildi! Nonvoy tasdiqlashini kuting.`);

  // Simulate status updates via P2P subscription (already listening via gun.on)
  renderCurrentTab();
}

// ====== MODAL ======
function showModal(html) {
  document.getElementById('modalContent').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('active');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('active');
}

// ====== TOAST ======
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.display = 'block';
  clearTimeout(el._t);
  el._t = setTimeout(() => el.style.display = 'none', 3000);
}

(function() {

})();
